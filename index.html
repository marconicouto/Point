<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Milhas & Cartões Tracker PWA</title>
    <!-- Bibliotecas Necessárias via CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- @supabase/supabase-js cliente oficial -->
    <script src="https://unpkg.com/@supabase/supabase-js@2.39.8/dist/umd/supabase.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        slate: {
                            950: '#020617',
                            900: '#0f172a',
                            850: '#1e293b'
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #020617;
            overflow: hidden;
        }
        /* Ocultar barra de rolagem estética */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #020617;
        }
        ::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 99px;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 antialiased select-none">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // IMPORTANTE: COLOQUE AQUI SUAS CREDENCIAIS DO SUPABASE PARA LER A TABELA 'news'
        const SUPABASE_URL = "https://pifarsxbrfwvmvlwvtnk.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpZmFyc3hicmZ3dm12bHd2dG5rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2NDg0OTYsImV4cCI6MjA5NTIyNDQ5Nn0.xrgI7q8z0Yew70kxZzWz4v8IiF_eHSY97Ed2NxvTwWw";

        function App() {
            const [posts, setPosts] = useState([]);
            const [isLoading, setIsLoading] = useState(false);
            const [activeScreen, setActiveScreen] = useState("feed");
            const [isBottomSheetOpen, setIsBottomSheetOpen] = useState(false);
            const [readingPost, setReadingPost] = useState(null);
            const [lastRefreshTime, setLastRefreshTime] = useState(new Date().toLocaleTimeString());
            const [secondsToRefresh, setSecondsToRefresh] = useState(1200);

            // Filtros com checkbox 100% circular
            const [filterTree, setFilterTree] = useState([
                {
                    categoria: "Cartões de Crédito",
                    subcategorias: ["Acúmulo", "Benefícios", "Isenção de Anuidade", "Adesão"],
                    isOpen: true,
                    selected: true,
                    activeSubs: ["Acúmulo", "Benefícios", "Isenção de Anuidade", "Adesão"]
                },
                {
                    categoria: "Fidelidade Nacional",
                    subcategorias: ["Transferência Bonificada", "Compra de Pontos", "Resgate de Voos"],
                    isOpen: true,
                    selected: true,
                    activeSubs: ["Transferência Bonificada", "Compra de Pontos", "Resgate de Voos"]
                },
                {
                    categoria: "Fidelidade Internacional",
                    subcategorias: ["Bônus de Envio", "Alianças Aéreas", "Tabela Fixa"],
                    isOpen: false,
                    selected: false,
                    activeSubs: []
                }
            ]);

            const [activeAlerts, setActiveAlerts] = useState(["Transferência Bonificada"]);

            useEffect(() => {
                fetchNewsFromSupabase();
                const interval = setInterval(() => {
                    setSecondsToRefresh(prev => {
                        if (prev <= 1) {
                            fetchNewsFromSupabase();
                            return 1200;
                        }
                        return prev - 1;
                    });
                }, 1000);
                return () => clearInterval(interval);
            }, []);

            useEffect(() => {
                if (posts.length === 0) return;
                const found = {};
                posts.forEach(p => {
                    const cat = p.categoria;
                    const sub = p.subcategoria;
                    if (!cat || !sub) return;
                    const c = cat.trim();
                    const s = sub.trim();
                    if (c.toLowerCase() === "ignorado" || s.toLowerCase() === "ignorado") return;
                    if (!found[c]) found[c] = [];
                    if (!found[c].includes(s)) found[c].push(s);
                });

                setFilterTree(prev => {
                    let isChanged = false;
                    const nextTree = prev.map(item => {
                        const existingCat = Object.keys(found).find(c => c.toLowerCase() === item.categoria.toLowerCase());
                        if (existingCat) {
                            const newSubs = [...item.subcategorias];
                            const newActive = [...item.activeSubs];
                            found[existingCat].forEach(sub => {
                                if (!item.subcategorias.some(s => s.toLowerCase() === sub.toLowerCase())) {
                                    newSubs.push(sub);
                                    newActive.push(sub);
                                    isChanged = true;
                                }
                            });
                            return { ...item, subcategorias: newSubs, activeSubs: newActive, selected: newActive.length === newSubs.length };
                        }
                        return item;
                    });

                    Object.keys(found).forEach(cat => {
                        const hasCat = prev.some(item => item.categoria.toLowerCase() === cat.toLowerCase());
                        if (!hasCat) {
                            nextTree.push({
                                categoria: cat,
                                subcategorias: found[cat],
                                isOpen: true,
                                selected: true,
                                activeSubs: [...found[cat]]
                            });
                            isChanged = true;
                        }
                    });

                    return isChanged ? nextTree : prev;
                });
            }, [posts]);

            // Método Real Supabase API
            const fetchNewsFromSupabase = async () => {
                setIsLoading(true);
                try {
                    if (SUPABASE_URL && !SUPABASE_URL.includes("SUA_URL")) {
                        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                        const { data, error } = await sb
                            .from("news")
                            .select("*")
                            .order("published_at", { ascending: false });
                        
                        if (error) throw error;
                        if (data) {
                            setPosts(data);
                            setLastRefreshTime(new Date().toLocaleTimeString());
                        }
                    } else {
                        // Dados de Fallback sofisticados de portais de milhas reais
                        const mockData = [
                            {
                                id: 1,
                                title: "Livelo lança compre pontos com até 55% de desconto para assinantes",
                                url: "https://pontospravoar.com/compre-pontos",
                                published_at: new Date(Date.now() - 1000*60*15).toISOString(),
                                summary: "Oportunidade para gerar lotes de 1.000 pontos Livelo a valores competitivos.",
                                categoria: "Fidelidade Nacional",
                                subcategoria: "Compra de Pontos",
                                source_site: "pontospravoar.com"
                            },
                            {
                                id: 2,
                                title: "Dux Visa Infinite do BRB estende acesso a salas VIP gratuitas",
                                url: "https://passageirodeprimeira.com",
                                published_at: new Date(Date.now() - 1000*60*45).toISOString(),
                                summary: "Cartão de metal mais exclusivo do país mantém benefícios premium inalterados.",
                                categoria: "Cartões de Crédito",
                                subcategoria: "Benefícios",
                                source_site: "passageirodeprimeira.com"
                            }
                        ];
                        setPosts(mockData);
                    }
                } catch(e) {
                    console.error("Falha ao recuperar notícias", e);
                } finally {
                    setIsLoading(false);
                }
            };

            const toggleCategory = (catName) => {
                setFilterTree(prev => prev.map(item => {
                    if (item.categoria === catName) {
                        const next = !item.selected;
                        return { ...item, selected: next, activeSubs: next ? [...item.subcategorias] : [] };
                    }
                    return item;
                }));
            };

            const toggleSubcategory = (catName, subName) => {
                setFilterTree(prev => prev.map(item => {
                    if (item.categoria === catName) {
                        const active = item.activeSubs.includes(subName);
                        const nextSubs = active ? item.activeSubs.filter(s => s !== subName) : [...item.activeSubs, subName];
                        return { ...item, activeSubs: nextSubs, selected: nextSubs.length === item.subcategorias.length };
                    }
                    return item;
                }));
            };

            const toggleAlert = (subName) => {
                setActiveAlerts(prev => prev.includes(subName) ? prev.filter(a => a !== subName) : [...prev, subName]);
            };

            const getFilteredPosts = () => {
                const activeSubs = filterTree.flatMap(item => item.activeSubs);
                return posts.filter(p => {
                    const cat = (p.categoria || "").trim().toLowerCase();
                    const sub = (p.subcategoria || "").trim().toLowerCase();
                    if (cat === "ignorado" || sub === "ignorado") return false;
                    return !p.subcategoria || activeSubs.includes(p.subcategoria);
                });
            };

            return (
                <div className="flex flex-col h-screen max-w-sm mx-auto bg-slate-950 border-x border-slate-900 relative">
                    
                    {/* CABEÇALHO FIXO NATIVO */}
                    <header className="sticky top-0 bg-slate-900/90 backdrop-blur-md border-b border-slate-800/60 h-14 flex items-center justify-between px-4 z-40">
                        <div className="flex items-center gap-2">
                            <span className="w-2.5 h-2.5 rounded-full bg-blue-500 animate-pulse"></span>
                            <span className="font-bold tracking-tight text-sm text-blue-500 font-mono">POINT DAS MILHAS</span>
                        </div>
                        
                        <div className="flex items-center gap-2 text-slate-400">
                            <i data-lucide="clock" className="w-3.5 h-3.5 text-slate-500"></i>
                            <span className="text-[10px] font-mono font-medium">auto-refresh in {Math.floor(secondsToRefresh / 60)}m</span>
                        </div>
                    </header>

                    {/* MIOLO COM SCROLL INDEPENDENTE */}
                    <div className="flex-1 overflow-y-auto px-3 py-3 pb-24">
                        
                        {/* INDICADOR DE AUTO-ATUALIZAÇÃO */}
                        <div className="flex items-center justify-between px-1.5 mb-2 text-[10px] text-slate-500 font-mono">
                            <span>Última atualização: {lastRefreshTime}</span>
                            <button onClick={fetchNewsFromSupabase} className="hover:text-blue-500 font-bold flex items-center gap-1">
                                <span className="underline">recarregar</span>
                            </button>
                        </div>

                        {isLoading && (
                            <div className="py-12 flex flex-col items-center justify-center text-slate-500 text-xs">
                                <span className="animate-spin text-blue-500 text-lg mb-2">●</span>
                                Carregando últimas novidades...
                            </div>
                        )}

                        {!isLoading && getFilteredPosts().length === 0 ? (
                            <div className="py-20 text-center text-slate-500 text-xs px-6 border border-dashed border-slate-800 rounded-2xl">
                                Nenhuma notícia atende aos filtros atuais. Modifique suas seleções na aba de Filtros abaixo!
                            </div>
                        ) : (
                            <div className="flex flex-col gap-1.5">
                                {getFilteredPosts().map(post => {
                                    const relativeTime = "há 10 min";
                                    return (
                                        <div 
                                            key={post.id || post.url}
                                            onClick={() => setReadingPost(post)}
                                            className="bg-slate-900/40 hover:bg-slate-900 border border-slate-900 hover:border-slate-800 p-2.5 rounded-xl transition cursor-pointer flex flex-col gap-1"
                                        >
                                            <div className="flex items-center justify-between text-[10px] text-slate-500 font-mono">
                                                <span className="bg-slate-850 text-slate-300 font-semibold px-1.5 py-0.5 rounded text-[9px]">
                                                    {post.source_site ? post.source_site.replace("www.","") : "portal"}
                                                </span>
                                                <span>{relativeTime}</span>
                                            </div>
                                            <h3 className="text-xs font-semibold text-slate-200 line-clamp-2 leading-snug">{post.title}</h3>
                                            <div className="flex items-center justify-between mt-1">
                                                <span className="bg-blue-950/40 text-blue-500 border border-blue-900/30 font-mono text-[9px] px-1.5 py-0.5 rounded font-medium">
                                                    {post.subcategoria || "Milhas Geral"}
                                                </span>
                                                <i data-lucide="chevron-right" className="w-3.5 h-3.5 text-slate-600"></i>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                    </div>

                    {/* CONTROLES DE LEITURA CHEIA (IFRAME E VOLTAR PRESERVANDO ESTADO) */}
                    {readingPost && (
                        <div className="absolute inset-0 bg-slate-950 z-50 flex flex-col">
                            {/* Botão de Voltar de toque amplo 44x44px */}
                            <div className="sticky top-0 h-14 bg-slate-900 border-b border-slate-850 flex items-center justify-between px-3">
                                <button 
                                    onClick={() => setReadingPost(null)}
                                    style={{ width: '44px', height: '44px' }}
                                    className="flex items-center justify-center text-slate-300 hover:text-white"
                                >
                                    <span className="text-lg font-bold">←</span>
                                </button>
                                <span className="text-xs text-slate-400 font-mono max-w-[150px] truncate">{readingPost.title}</span>
                                <a 
                                    href={readingPost.url} 
                                    target="_blank" 
                                    className="text-blue-500 font-mono text-xs hover:underline flex items-center gap-1"
                                >
                                    Navegador
                                </a>
                            </div>
                            <div className="flex-1 bg-white">
                                <iframe 
                                    src={readingPost.url} 
                                    className="w-full h-full border-none"
                                    title="Modo Leitura"
                                />
                            </div>
                        </div>
                    )}

                    {/* BARRA DE NAVEGAÇÃO INFERIOR FIXA (BOTTOM NAV) */}
                    <nav className="fixed bottom-0 left-0 right-0 max-w-sm mx-auto h-16 bg-slate-900/95 backdrop-blur-md border-t border-slate-850/60 flex items-center justify-around px-2 z-40">
                        <button 
                            onClick={() => { setActiveScreen("feed"); setIsBottomSheetOpen(false); }}
                            style={{ width: '56px', height: '44px' }}
                            className={`flex flex-col items-center justify-center gap-0.5 transition ${activeScreen === "feed" ? "text-blue-500" : "text-slate-400"}`}
                        >
                            <span className="text-xs font-semibold">Feed</span>
                        </button>
                        
                        <button 
                            onClick={() => setIsBottomSheetOpen(true)}
                            style={{ width: '64px', height: '44px' }}
                            className="flex flex-col items-center justify-center gap-0.5 text-slate-400 hover:text-blue-500"
                        >
                            <span className="text-xs font-semibold">Filtros</span>
                        </button>

                        <button 
                            onClick={() => { setActiveScreen("alerts"); setIsBottomSheetOpen(false); }}
                            style={{ width: '56px', height: '44px' }}
                            className={`flex flex-col items-center justify-center gap-0.5 transition ${activeScreen === "alerts" ? "text-blue-500" : "text-slate-400"}`}
                        >
                            <span className="text-xs font-semibold">Alertas</span>
                        </button>
                    </nav>

                    {/* BOTTOM SHEET DE FILTROS FLUIDO COM CHECKBOXES CIRCULARES */}
                    {isBottomSheetOpen && (
                        <div className="absolute inset-x-0 bottom-0 top-1/4 bg-slate-900 border-t border-slate-800 rounded-t-2xl z-50 flex flex-col shadow-2xl">
                            <div className="h-10 flex items-center justify-between px-4 border-b border-slate-850">
                                <span className="text-xs font-bold font-mono text-slate-400">FILTROS POR CATEGORIAS</span>
                                <button 
                                    onClick={() => setIsBottomSheetOpen(false)}
                                    className="text-xs font-bold text-blue-500 px-3 py-1 bg-slate-850 rounded"
                                >
                                    Aplicar
                                </button>
                            </div>

                            <div className="flex-1 overflow-y-auto p-4 flex flex-col gap-4">
                                {filterTree.map(item => (
                                    <div key={item.categoria} className="flex flex-col gap-1.5">
                                        <div className="flex items-center justify-between bg-slate-950/60 p-2.5 rounded-lg border border-slate-850">
                                                   <button 
                                                    style={{ width: '44px', height: '44px' }}
                                                    onClick={() => toggleCategory(item.categoria)}
                                                    className={`flex items-center justify-center rounded-full border border-slate-700 transition ${item.selected ? "bg-blue-500 text-slate-950 border-blue-600" : "bg-transparent text-transparent"}`}
                                                >
                                                    ✓
                                                </button>
                                                <span className="text-xs font-bold text-slate-200">{item.categoria}</span>
                                            </div>
                                        </div>

                                        <div className="pl-6 flex flex-col gap-2">
                                            {item.subcategorias.map(sub => {
                                                const active = item.activeSubs.includes(sub);
                                                const alerted = activeAlerts.includes(sub);
                                                return (
                                                    <div key={sub} className="flex items-center justify-between py-1 border-b border-slate-900">
                                                        <div className="flex items-center gap-2">
                                                            {/* Checkbox circular sub */}
                                                            <button 
                                                                style={{ width: '44px', height: '44px' }}
                                                                onClick={() => toggleSubcategory(item.categoria, sub)}
                                                                className={`flex items-center justify-center rounded-full border border-slate-800 transition ${active ? "bg-blue-600 text-white border-blue-500" : "bg-transparent text-transparent border-slate-800"}`}
                                                            >
                                                                ✓
                                                            </button>
                                                            <span className="text-[11px] text-slate-300 font-medium">{sub}</span>
                                                        </div>

                                                        {/* Sino de Alerta de Toque Amplo */}
                                                        <button 
                                                            style={{ width: '44px', height: '44px' }}
                                                            onClick={() => toggleAlert(sub)}
                                                            className={`flex items-center justify-center transition ${alerted ? "text-blue-400" : "text-slate-600 hover:text-slate-400"}`}
                                                        >
                                                            🔔
                                                        </button>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        // Inicializa ícones do Lucide
        setTimeout(() => {
            if (window.lucide) {
                window.lucide.createIcons();
            }
        }, 800);
    </script>
</body>
</html>
