<body class="antialiased bg-[#f3f4f6]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const SUPABASE_URL = "https://pifarsxbrfwvmvlwvtnk.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpZmFyc3hicmZ3dm12bHd2dG5rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2NDg0OTYsImV4cCI6MjA5NTIyNDQ5Nn0.xrgI7q8z0Yew70kxZzWz4v8IiF_eHSY97Ed2NxvTwWw";
        const VAPID_PUBLIC_KEY = "BABJwyAjpR8E5Ohl-a63lnx517H57Hdnqq6xDRDGXzwc1_2XU6_oN_4RG3kvDaKIutnknhJlhlDVBS-GqTINz14";

        // Ícones em SVG
        const Icons = {
            Bell: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>,
            Check: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
            Settings: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.1a2 2 0 0 1-1-1.72v-.51a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>,
            ExternalLink: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>,
            Star: ({fill}) => <svg width="18" height="18" viewBox="0 0 24 24" fill={fill || "none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>,
            Filter: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
        };

        function Header({ setIsBottomSheetOpen }) {
            return (
                <header className="h-14 bg-white border-b border-gray-100 flex items-center justify-between px-4 sticky top-0 z-40 shrink-0 pt-safe">
                    <div className="flex items-center gap-2">
                        <div className="w-8 h-8 rounded-lg bg-blue-50 flex items-center justify-center p-1">
                            <svg viewBox="0 0 24 24" fill="none" stroke="#0f3a5f" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2v20"/><path d="M2 12h20"/><path d="M12 2a10 10 0 0 1 10 10"/></svg>
                        </div>
                        <span className="font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-900 to-blue-700 tracking-tighter text-base">Point das Milhas</span>
                    </div>
                    <button onClick={() => setIsBottomSheetOpen(true)} className="flex items-center gap-2 px-3 py-2 bg-gray-50 rounded-full text-blue-800 text-xs font-bold uppercase">
                        <div className="w-4 h-4"><Icons.Filter /></div>
                        Filtros
                    </button>
                </header>
            );
        }

        function App() {
            const [posts, setPosts] = useState([]);
            const [isLoading, setIsLoading] = useState(false);
            const [activeScreen, setActiveScreen] = useState("feed");
            const [isBottomSheetOpen, setIsBottomSheetOpen] = useState(false);
            const [readingPost, setReadingPost] = useState(null);
            const [pullDistance, setPullDistance] = useState(0);
            const [favorites, setFavorites] = useState(() => JSON.parse(localStorage.getItem("point_pwa_favs") || "[]"));
            const [activeAlerts, setActiveAlerts] = useState(() => JSON.parse(localStorage.getItem("point_pwa_alerts") || "[]"));
            const [filterTree, setFilterTree] = useState([]);

            const touchStartY = useRef(0);
            const containerRef = useRef(null);

            useEffect(() => { localStorage.setItem("point_pwa_favs", JSON.stringify(favorites)); }, [favorites]);
            useEffect(() => { localStorage.setItem("point_pwa_alerts", JSON.stringify(activeAlerts)); }, [activeAlerts]);

            const categoryConfigs = useMemo(() => [
                { ordem: 10, cat: "Transferência Bonificada", subs: ["Smiles", "Latam", "Azul", "Avios", "Aadvantage", "Outros"] },
                { ordem: 20, cat: "Alteração de regras", subs: ["Smiles", "Latam", "Azul", "Avios", "Aadvantage", "Outros"] },
                { ordem: 30, cat: "Passagem com milhas", subs: ["Smiles", "Latam", "Azul", "Avios", "Aadvantage", "Outros"] },
                { ordem: 40, cat: "Passagem em dinheiro", subs: ["Brasil", "América do sul", "Caribe", "América do norte", "Europa", "Ásia", "África", "Oceania"] },
                { ordem: 50, cat: "Hotel", subs: ["Accor", "Marriott", "Hilton", "Hyatt", "Wyndham", "IHG", "Radisson", "Outros"] },
                { ordem: 60, cat: "Cartão de crédito", subs: ["Itaú", "Santander", "Bradesco", "Banco do Brasil", "Porto Bank", "Caixa", "C6 Bank", "XP e Rico", "Outros", "Anuidade grátis"] },
                { ordem: 80, cat: "Status match ou gratuito", subs: [] }
            ], []);

            useEffect(() => { fetchData(); }, []);

            useEffect(() => {
                const found = {};
                posts.forEach(p => {
                    const c = (p.categoria || "").trim();
                    const s = (p.subcategoria || "Geral").trim();
                    if (!c || c.toLowerCase() === "ignorado") return;
                    if (!found[c]) found[c] = [];
                    if (!found[c].includes(s)) found[c].push(s);
                });

                const newTree = categoryConfigs.map(config => {
                    const subsInDb = found[config.cat] || [];
                    const allSubs = Array.from(new Set([...config.subs, ...subsInDb]));
                    const sortedSubs = allSubs.sort((a,b) => config.subs.indexOf(a) - config.subs.indexOf(b));
                    return {
                        categoria: config.cat,
                        subcategorias: sortedSubs,
                        isOpen: true,
                        selected: true,
                        activeSubs: [...sortedSubs]
                    };
                });
                setFilterTree(newTree);
            }, [posts, categoryConfigs]);

            const getCleanSiteName = (name) => {
                if (!name) return "Fonte";
                const map = {
                    "pontopravoar": "Ponto pra voar",
                    "passagenspelomundo": "Passagens pelo mundo",
                    "melhoresdestinos": "Melhores destinos",
                    "passageirodeprimeira": "Passageiro de primeira",
                    "pontopravoarcombr": "Ponto pra voar",
                    "passagenspelomundocombr": "Passagens pelo mundo",
                    "melhoresdestinoscombr": "Melhores destinos",
                    "passageirodeprimeiracombr": "Passageiro de primeira"
                };
                const cleanName = name.toLowerCase().replace(/[^a-z]/g, "");
                if (map[cleanName]) return map[cleanName];
                return name.replace(new RegExp('\.com(\.br)?', 'i'), "").replace(new RegExp('https?:\/\/(www\.)?', ''), "");
            };

            const getRelativeTime = (isoString) => {
                try {
                    const diffMs = Date.now() - new Date(isoString).getTime();
                    const diffMins = Math.floor(diffMs / (1000 * 60));
                    const diffHours = Math.floor(diffMs / (1000 * 60 * 60));
                    if (diffMins < 1) return "agora";
                    if (diffMins < 60) return ('há ' + diffMins + ' min').toLowerCase();
                    if (diffHours < 24) return ('há ' + diffHours + 'h').toLowerCase();
                    return new Date(isoString).toLocaleDateString("pt-BR", { day: "numeric", month: "short" }).toLowerCase();
                } catch { return "há pouco"; }
            };

            const fetchData = async () => {
                setIsLoading(true);
                try {
                    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                    const { data } = await sb.from("news").select("*").order("published_at", { ascending: false }).limit(60);
                    if (data) setPosts(data);
                } catch(e) { console.error(e); }
                setIsLoading(false);
            };

            const handleClearAllFilters = () => {
                setFilterTree(prev => prev.map(item => ({ ...item, selected: false, activeSubs: [] })));
            };

            const subscribeToPush = async (cat, sub) => {
                if (!('serviceWorker' in navigator)) return;
                try {
                    const reg = await navigator.serviceWorker.ready;
                    const subscr = await reg.pushManager.subscribe({
                        userVisibleOnly: true,
                        applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
                    });
                    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                    await sb.from("push_subscriptions").upsert({
                        subscription: subscr, category: cat, subcategory: sub, updated_at: new Date().toISOString()
                    }, { onConflict: 'subscription' });
                } catch(e) { console.error("Push Error", e); }
            };

            const toggleCategory = (catName) => {
                setFilterTree(prev => prev.map(item => {
                    if (item.categoria === catName) {
                        const next = !item.selected;
                        return { ...item, selected: next, activeSubs: next ? [...item.subcategorias] : [] };
                    }
                    return item;
                }));
            };

            const toggleSubcategory = (catName, subName) => {
                setFilterTree(prev => prev.map(item => {
                    if (item.categoria === catName) {
                        const active = item.activeSubs.includes(subName);
                        const nextSubs = active ? item.activeSubs.filter(s => s !== subName) : [...item.activeSubs, subName];
                        return { ...item, activeSubs: nextSubs };
                    }
                    return item;
                }));
            };

            const toggleCategoryAlert = async (catName, e) => {
                if(e) e.stopPropagation();
                const item = filterTree.find(i => i.categoria === catName);
                if (!item) return;

                const alarmKeys = item.subcategorias.map(sub => catName + ":::" + sub);
                const allAlerted = item.subcategorias.every(sub => activeAlerts.includes(catName + ":::" + sub));
                
                if (allAlerted) {
                    setActiveAlerts(prev => prev.filter(k => !alarmKeys.includes(k)));
                } else {
                    for (const sub of item.subcategorias) {
                        await subscribeToPush(catName, sub);
                    }
                    setActiveAlerts(prev => [...new Set([...prev, ...alarmKeys])]);
                }
            };

            const urlBase64ToUint8Array = (base64String) => {
                const padding = "=".repeat((4 - (base64String.length % 4)) % 4);
                const base64 = (base64String + padding).replace(/-/g, "+").replace(/_/g, "/");
                const rawData = window.atob(base64);
                const outputArray = new Uint8Array(rawData.length);
                for (let i = 0; i < rawData.length; ++i) outputArray[i] = rawData.charCodeAt(i);
                return outputArray;
            };

            const toggleFavorite = (id, e) => {
                if (e) e.stopPropagation();
                setFavorites(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
            };

            const getCategoryTheme = (categoryName) => {
                const lower = (categoryName || "").toLowerCase();
                const green = { badge: "bg-emerald-50 text-emerald-700 border border-emerald-100 font-black", dot: "bg-emerald-600", checkbox: "bg-emerald-600 border-emerald-600" };
                const blue = { badge: "bg-blue-50 text-blue-700 border border-blue-100 font-black", dot: "bg-blue-600", checkbox: "bg-blue-600 border-blue-600" };
                const yellow = { badge: "bg-yellow-50 text-yellow-700 border border-yellow-100 font-black", dot: "bg-yellow-600", checkbox: "bg-yellow-600 border-yellow-600" };
                const orange = { badge: "bg-orange-50 text-orange-700 border border-orange-100 font-black", dot: "bg-orange-600", checkbox: "bg-orange-600 border-orange-600" };
                const purple = { badge: "bg-purple-50 text-purple-700 border border-purple-100 font-black", dot: "bg-purple-600", checkbox: "bg-purple-600 border-purple-600" };
                const red = { badge: "bg-red-50 text-red-700 border border-red-100 font-black", dot: "bg-red-600", checkbox: "bg-red-600 border-red-600" };
                const cyan = { badge: "bg-cyan-50 text-cyan-700 border border-cyan-100 font-black", dot: "bg-cyan-600", checkbox: "bg-cyan-600 border-cyan-600" };
                const pink = { badge: "bg-pink-50 text-pink-700 border border-pink-100 font-black", dot: "bg-pink-600", checkbox: "bg-pink-600 border-pink-600" };
                
                if (lower.includes("transferência bonificada") || lower.includes("transfência bonificada")) return green;
                if (lower.includes("passagem com milhas")) return yellow;
                if (lower.includes("passagem em dinheiro")) return blue;
                if (lower.includes("cartão") || lower.includes("cartao") || lower.includes("credito")) return pink;
                if (lower.includes("hotel")) return purple;
                if (lower.includes("alteração") || lower.includes("regras")) return red;
                if (lower.includes("status match") || lower.includes("gratuito")) return cyan;
                return blue;
            };

            const toggleAlert = async (cat, sub, e) => {
                if(e) { e.stopPropagation(); e.preventDefault(); }
                const key = cat + ":::" + sub;
                const willEnable = !activeAlerts.includes(key);
                
                // Update UI instantly
                if (willEnable) {
                    setActiveAlerts(prev => [...prev, key]);
                    await subscribeToPush(cat, sub);
                } else {
                    setActiveAlerts(prev => prev.filter(k => k !== key));
                }
            };

            const filteredPosts = posts.filter(p => {
                const cat = (p.categoria || "").trim();
                const sub = (p.subcategoria || "Geral").trim();
                if (cat.toLowerCase() === "ignorado") return false;
                const node = filterTree.find(n => n.categoria === cat);
                if (!node) return true;
                return node.selected && node.activeSubs.includes(sub);
            }).sort((a, b) => {
                const aFav = favorites.includes(a.id);
                const bFav = favorites.includes(b.id);
                if (aFav !== bFav) return aFav ? -1 : 1;
                return new Date(b.published_at) - new Date(a.published_at);
            });

            return (
                <div className="flex flex-col h-[100dvh] w-full md:max-w-md mx-auto bg-[#f3f4f6] relative overflow-hidden shadow-2xl">
                    <Header setIsBottomSheetOpen={setIsBottomSheetOpen} />

                    <div ref={containerRef} className="flex-1 overflow-y-auto px-4 py-4 space-y-4 scrollbar-none pb-24">
                        {activeScreen === "feed" ? (
                          isLoading ? (
                              <div className="py-20 flex flex-col items-center justify-center gap-3">
                                  <div className="w-6 h-6 border-2 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                                  <span className="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Sincronizando...</span>
                              </div>
                          ) : filteredPosts.map(post => (
                              <div key={post.id} onClick={() => setReadingPost(post)} className="bg-white border border-gray-100 p-4 rounded-2xl shadow-sm active:scale-[0.98] transition">
                                  <h3 className="text-sm font-extrabold text-gray-900 leading-snug mb-2">{post.title}</h3>
                                  <div className="flex items-center justify-between text-[10px] font-bold text-gray-400 mb-3">
                                      <span className="text-blue-800">{getCleanSiteName(post.source_site)}</span>
                                      <span className="font-normal text-gray-400">{getRelativeTime(post.published_at)}</span>
                                  </div>
                                  <div className="flex items-center justify-between pt-3 border-t border-gray-50">
                                      <span className={"text-[9px] px-3 py-1 rounded-full uppercase font-black tracking-widest " + getCategoryTheme(post.categoria).badge}>
                                          {post.categoria}
                                      </span>
                                      <button onClick={(e) => toggleFavorite(post.id, e)} className="p-1 text-gray-300">
                                        <Icons.Star fill={favorites.includes(post.id) ? "#fbbf24" : "none"} />
                                      </button>
                                  </div>
                              </div>
                          ))
                        ) : (
                          <div className="space-y-4">
                            <h2 className="text-lg font-black text-gray-900">Alertas Ativos</h2>
                            {activeAlerts.length === 0 && <p className="text-sm text-gray-500">Nenhum alerta ativo.</p>}
                            {activeAlerts.map(key => {
                                const [cat, sub] = key.split(":::");
                                return (
                                  <div key={key} className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between">
                                    <div>
                                      <p className="text-sm font-black text-gray-900">{cat}</p>
                                      <p className="text-xs text-gray-500">{sub}</p>
                                    </div>
                                    <button onClick={() => setActiveAlerts(prev => prev.filter(k => k !== key))} className="text-red-500 text-xs font-bold">REMOVER</button>
                                  </div>
                                )
                            })}
                          </div>
                        )}
                    </div>

                    <nav className="absolute bottom-0 inset-x-0 h-16 bg-white border-t border-gray-100 grid grid-cols-2 safe-pb">
                        <button onClick={() => setActiveScreen("feed")} className={"flex flex-col items-center justify-center " + (activeScreen === "feed" ? "text-transparent bg-clip-text bg-gradient-to-r from-blue-900 to-blue-700" : "text-gray-300")}>
                            <div className="w-6 h-6"><Icons.Settings /></div>
                            <span className="text-[9px] font-black uppercase tracking-widest mt-1">Notícias</span>
                        </button>
                        <button onClick={() => setActiveScreen("alerts")} className={"flex flex-col items-center justify-center " + (activeScreen === "alerts" ? "text-transparent bg-clip-text bg-gradient-to-r from-blue-900 to-blue-700" : "text-gray-300")}>
                            <div className="w-6 h-6 relative">
                                <Icons.Bell />
                                {activeAlerts.length > 0 && <div className="absolute -top-0.5 -right-0.5 w-2 h-2 bg-red-500 rounded-full border-white border animate-pulse"></div>}
                            </div>
                            <span className="text-[9px] font-black uppercase tracking-widest mt-1">Alertas</span>
                        </button>
                    </nav>

                    {/* READING MODE */}
                    {readingPost && (
                        <div className="absolute inset-x-0 top-0 bottom-0 bg-white z-[60] flex flex-col animate-fade-in">
                            <header className="h-14 bg-white border-b border-gray-100 flex items-center justify-between px-3 shrink-0 pt-safe">
                                <button onClick={() => setReadingPost(null)} className="w-10 h-10 flex items-center justify-center text-gray-400">←</button>
                                <span className="text-xs font-bold text-gray-900 truncate max-w-[200px]">{readingPost.title}</span>
                                <a href={readingPost.url} target="_blank" className="p-2 text-blue-600"><Icons.ExternalLink /></a>
                            </header>
                            <iframe src={readingPost.url} className="flex-1 w-full border-none bg-gray-50" />
                        </div>
                    )}

                    {/* FILTER DRAWER */}
                    {isBottomSheetOpen && (
                        <div className="absolute inset-0 z-[70] flex animate-fade-in overflow-hidden">
                            <div className="w-[20%] h-full bg-black/40" onClick={() => setIsBottomSheetOpen(false)}></div>
                            <div className="w-[80%] h-full bg-white shadow-2xl animate-slide-left flex flex-col">
                                <header className="h-12 bg-gray-50 border-b border-gray-100 flex items-center justify-between px-4 shrink-0 pt-safe font-bold text-xs uppercase">
                                    <span className="text-gray-400">FILTROS</span>
                                    <button onClick={handleClearAllFilters} className="text-gray-500 hover:text-blue-600">Limpar</button>
                                    <button onClick={() => setIsBottomSheetOpen(false)} className="text-blue-600">FECHAR</button>
                                </header>
                                <div className="flex-1 overflow-y-auto p-4 space-y-4">
                                    {filterTree.map(item => {
                                        const theme = getCategoryTheme(item.categoria);
                                        return (
                                            <div key={item.categoria} className="space-y-1">
                                                <div className="bg-gray-50 p-2 rounded-xl flex items-center justify-between border border-gray-100">
                                                    <div className="flex items-center gap-2" onClick={() => toggleCategory(item.categoria)}>
                                                        <div className={"w-5 h-5 rounded border transition flex items-center justify-center " + (item.selected ? theme.checkbox : "border-gray-300 bg-white")}>
                                                          {item.selected && <Icons.Check />}
                                                        </div>
                                                        <span className="text-base font-black text-gray-900 uppercase">{item.categoria}</span>
                                                    </div>
                                                    <button onClick={(e) => toggleCategoryAlert(item.categoria, e)} className={"p-1.5 rounded-full flex items-center justify-center " + (item.subcategorias.every(s => activeAlerts.includes(item.categoria + ":::" + s)) ? "text-red-500" : "text-gray-300")}>
                                                        <div className="w-4 h-4"><Icons.Bell /></div>
                                                    </button>
                                                </div>
                                                <div className="pl-4 space-y-2 py-2">
                                                    {item.subcategorias.map(sub => (
                                                        <div key={sub} className="flex items-center justify-between py-1 border-b border-gray-50 last:border-none">
                                                            <div className="flex items-center gap-2" onClick={() => toggleSubcategory(item.categoria, sub)}>
                                                              <div className={"w-4 h-4 rounded border flex items-center justify-center " + (item.activeSubs.includes(sub) ? theme.checkbox : "border-gray-300 bg-white")}>
                                                                {item.activeSubs.includes(sub) && <div className="w-2 h-2 bg-white rounded-full"></div>}
                                                              </div>
                                                              <span className="text-base font-bold text-gray-600">{sub}</span>
                                                            </div>
                                                            <button onClick={(e) => toggleAlert(item.categoria, sub, e)} className={"w-10 h-10 rounded-full flex items-center justify-center transition-colors " + (activeAlerts.includes(item.categoria + ":::" + sub) ? "text-red-500 bg-red-50" : "text-gray-400")}>
                                                                <div className="w-5 h-5 flex items-center justify-center"><Icons.Bell /></div>
                                                            </button>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
