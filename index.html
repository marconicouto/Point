<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Point das Milhas PWA</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2.39.8/dist/umd/supabase.js"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        slate: {
                            950: '#020617',
                            900: '#0f172a',
                            850: '#1e293b'
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #020617;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }
        /* Ocultar barra de rolagem estética */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #020617;
        }
        ::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 99px;
        }
        
        /* Ajuste para o iframe ocupar todo o espaço */
        .iframe-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 antialiased select-none">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // IMPORTANTE: Suas credenciais já estão configuradas
        const SUPABASE_URL = "https://pifarsxbrfwvmvlwvtnk.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpZmFyc3hicmZ3dm12bHd2dG5rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2NDg0OTYsImV4cCI6MjA5NTIyNDQ5Nn0.xrgI7q8z0Yew70kxZzWz4v8IiF_eHSY97Ed2NxvTwWw";

        // Ícones Simples em SVG para não depender de biblioteca externa travando
        const IconClock = () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
        const IconChevronRight = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>;
        const IconChevronDown = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>;
        const IconBack = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>;
        const IconAlert = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>;

        function App() {
            const [posts, setPosts] = useState([]);
            const [isLoading, setIsLoading] = useState(false);
            const [activeScreen, setActiveScreen] = useState("feed");
            const [isBottomSheetOpen, setIsBottomSheetOpen] = useState(false);
            const [readingPost, setReadingPost] = useState(null);
            const [lastRefreshTime, setLastRefreshTime] = useState(new Date().toLocaleTimeString());
            const [secondsToRefresh, setSecondsToRefresh] = useState(1200);

            // Estrutura de filtros baseada na árvore de decisão da sua planilha
            const [filterTree, setFilterTree] = useState([
                {
                    categoria: "Acúmulo",
                    subcategorias: ["Cartão de Crédito", "Compra de Pontos", "Shopping", "Clube", "Outros"],
                    isOpen: true,
                    selected: true,
                    activeSubs: ["Cartão de Crédito", "Compra de Pontos", "Shopping", "Clube", "Outros"]
                },
                {
                    categoria: "Transferência Bonificada",
                    subcategorias: ["Azul", "Smiles", "LATAM Pass", "TAP", "Livelo", "Esfera", "Iuppi", "C6/Átomos", "Mercado Pago", "Outros"],
                    isOpen: true,
                    selected: true,
                    activeSubs: ["Azul", "Smiles", "LATAM Pass", "TAP", "Livelo", "Esfera", "Iuppi", "C6/Átomos", "Mercado Pago", "Outros"]
                },
                {
                    categoria: "Emissões",
                    subcategorias: ["Nacional", "Internacional", "Tabela Fixa"],
                    isOpen: false,
                    selected: false,
                    activeSubs: []
                },
                {
                    categoria: "Cartões",
                    subcategorias: ["Anuidade", "Adesão/Bônus", "Benefícios", "Spread"],
                    isOpen: false,
                    selected: false,
                    activeSubs: []
                },
                {
                    categoria: "Hospedagem",
                    subcategorias: ["Promoção", "Status Match"],
                    isOpen: false,
                    selected: false,
                    activeSubs: []
                }
            ]);

            const [activeAlerts, setActiveAlerts] = useState(["Transferência Bonificada", "Azul", "Smiles"]);

            useEffect(() => {
                fetchNewsFromSupabase();
                const interval = setInterval(() => {
                    setSecondsToRefresh(prev => {
                        if (prev <= 1) {
                            fetchNewsFromSupabase();
                            return 1200;
                        }
                        return prev - 1;
                    });
                }, 1000);
                return () => clearInterval(interval);
            }, []);

            // Método Real Supabase API
            const fetchNewsFromSupabase = async () => {
                setIsLoading(true);
                try {
                    if (SUPABASE_URL && SUPABASE_ANON_KEY) {
                        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                        const { data, error } = await sb
                            .from("news")
                            .select("*")
                            .order("published_at", { ascending: false })
                            .limit(50); // Limitando para performance no protótipo
                        
                        if (error) throw error;
                        if (data) {
                            // Filtra notícias "fora do tema" direto na origem
                            const validData = data.filter(p => 
                                p.categoria && 
                                p.subcategoria && 
                                p.categoria.toLowerCase() !== "ignorado" && 
                                p.subcategoria.toLowerCase() !== "ignorado"
                            );
                            setPosts(validData);
                            setLastRefreshTime(new Date().toLocaleTimeString());
                        }
                    }
                } catch(e) {
                    console.error("Falha ao recuperar notícias do Supabase", e);
                } finally {
                    setIsLoading(false);
                }
            };

            const toggleCategoryExpand = (catName) => {
                setFilterTree(prev => prev.map(item => 
                    item.categoria === catName ? { ...item, isOpen: !item.isOpen } : item
                ));
            };

            const toggleCategorySelection = (catName) => {
                setFilterTree(prev => prev.map(item => {
                    if (item.categoria === catName) {
                        const nextSelected = !item.selected;
                        return { 
                            ...item, 
                            selected: nextSelected, 
                            activeSubs: nextSelected ? [...item.subcategorias] : [] 
                        };
                    }
                    return item;
                }));
            };

            const toggleSubcategory = (catName, subName) => {
                setFilterTree(prev => prev.map(item => {
                    if (item.categoria === catName) {
                        const isActive = item.activeSubs.includes(subName);
                        const nextSubs = isActive 
                            ? item.activeSubs.filter(s => s !== subName) 
                            : [...item.activeSubs, subName];
                        return { 
                            ...item, 
                            activeSubs: nextSubs, 
                            selected: nextSubs.length === item.subcategorias.length 
                        };
                    }
                    return item;
                }));
            };

            const toggleAlert = (subName) => {
                setActiveAlerts(prev => prev.includes(subName) ? prev.filter(a => a !== subName) : [...prev, subName]);
            };

            const getFilteredPosts = () => {
                const activeSubs = filterTree.flatMap(item => item.activeSubs);
                return posts.filter(p => {
                    if (!p.subcategoria) return false;
                    return activeSubs.includes(p.subcategoria);
                });
            };

            // Função para formatar tempo relativo simples
            const formatRelativeTime = (dateString) => {
                if (!dateString) return "n/d";
                const now = new Date();
                const past = new Date(dateString);
                const diffInMs = now - past;
                const diffInMin = Math.floor(diffInMs / (1000 * 60));
                const diffInHours = Math.floor(diffInMin / 60);
                const diffInDays = Math.floor(diffInHours / 24);

                if (diffInMin < 1) return "agora";
                if (diffInMin < 60) return `há ${diffInMin} min`;
                if (diffInHours < 24) return `há ${diffInHours}h`;
                return `há ${diffInDays} dias`;
            };

            return (
                <div className="flex flex-col h-screen max-w-md mx-auto bg-slate-950 border-x border-slate-900 relative overflow-hidden">
                    
                    {/* CABEÇALHO FIXO NATIVO */}
                    <header className="sticky top-0 bg-slate-900/95 backdrop-blur-sm border-b border-slate-800 h-14 flex items-center justify-between px-4 z-40">
                        <div className="flex items-center gap-2">
                            <span className="w-2.5 h-2.5 rounded-full bg-blue-500 animate-pulse"></span>
                            <span className="font-bold tracking-tight text-sm text-white font-mono">POINT DAS MILHAS</span>
                        </div>
                        
                        <div className="flex items-center gap-1.5 text-slate-500 font-mono text-[10px]">
                            <IconClock />
                            <span>refresh em {Math.floor(secondsToRefresh / 60)}m</span>
                        </div>
                    </header>

                    {/* MIOLO COM SCROLL INDEPENDENTE */}
                    <main className="flex-1 overflow-y-auto px-3 py-3 pb-24">
                        
                        {/* INDICADOR DE STATUS */}
                        <div className="flex items-center justify-between px-1 mb-3 text-[10px] text-slate-600 font-mono">
                            <span>Sincronizado: {lastRefreshTime}</span>
                            <button onClick={fetchNewsFromSupabase} className="hover:text-blue-500 font-bold flex items-center gap-1">
                                <span className="underline">forçar atualização</span>
                            </button>
                        </div>

                        {isLoading && posts.length === 0 && (
                            <div className="py-20 flex flex-col items-center justify-center text-slate-600 text-xs gap-3">
                                <div className="w-6 h-6 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                                Consultando Supabase...
                            </div>
                        )}

                        {!isLoading && getFilteredPosts().length === 0 ? (
                            <div className="py-16 text-center text-slate-600 text-xs px-8 border border-dashed border-slate-800 rounded-2xl bg-slate-900/20">
                                <div className="text-xl mb-2">🔭</div>
                                Nenhuma notícia encontrada para os filtros selecionados.<br/>Tente ativar mais categorias na aba Filtros.
                            </div>
                        ) : (
                            <div className="flex flex-col gap-2">
                                {getFilteredPosts().map(post => (
                                    <article 
                                        key={post.id}
                                        onClick={() => setReadingPost(post)}
                                        className="bg-slate-900/60 hover:bg-slate-900 border border-slate-800/50 hover:border-slate-700 p-3 rounded-xl transition cursor-pointer flex flex-col gap-1.5 active:scale-[0.98]"
                                    >
                                        <div className="flex items-center justify-between text-[10px] text-slate-500 font-mono">
                                            <span className="bg-slate-800 text-slate-300 font-semibold px-2 py-0.5 rounded">
                                                {post.source_site ? post.source_site.replace("www.","").split('/')[0] : "portal"}
                                            </span>
                                            <span>{formatRelativeTime(post.published_at)}</span>
                                        </div>
                                        <h3 className="text-[12px] font-semibold text-slate-100 line-clamp-2 leading-snug">{post.title}</h3>
                                        <div className="flex items-center justify-between mt-0.5">
                                            <span className="bg-blue-950/50 text-blue-400 border border-blue-900/50 font-mono text-[9px] px-2 py-0.5 rounded font-medium">
                                                {post.subcategoria}
                                            </span>
                                            <div className="text-slate-600"><IconChevronRight /></div>
                                        </div>
                                    </article>
                                ))}
                            </div>
                        )}
                    </main>

                    {/* CONTROLES DE LEITURA CHEIA (IFRAME) */}
                    {readingPost && (
                        <div className="absolute inset-0 bg-slate-950 z-50 flex flex-col animate-slideInUp">
                            <div className="sticky top-0 h-14 bg-slate-900 border-b border-slate-800 flex items-center justify-between px-2 z-10">
                                <button 
                                    onClick={() => setReadingPost(null)}
                                    className="w-10 h-10 flex items-center justify-center text-slate-300 hover:text-white active:bg-slate-800 rounded-full"
                                >
                                    <IconBack />
                                </button>
                                <span className="text-[11px] text-slate-400 font-medium max-w-[200px] truncate text-center">{readingPost.title}</span>
                                <a 
                                    href={readingPost.url} 
                                    target="_blank" 
                                    rel="noopener noreferrer"
                                    className="text-blue-500 font-mono text-[10px] px-3 py-1.5 hover:bg-blue-950 rounded-lg active:scale-95"
                                >
                                    Sair
                                </a>
                            </div>
                            <div className="flex-1 bg-white iframe-container overflow-hidden relative">
                                {/* Indicador de carregamento atrás do iframe */}
                                <div className="absolute inset-0 flex items-center justify-center text-slate-400 text-xs bg-slate-950">Carregando site...</div>
                                <iframe 
                                    src={readingPost.url} 
                                    title="Leitura da Notícia"
                                    className="relative z-10 w-full h-full"
                                />
                            </div>
                        </div>
                    )}

                    {/* BARRA DE NAVEGAÇÃO INFERIOR FIXA (BOTTOM NAV) */}
                    <nav className="fixed bottom-0 left-0 right-0 max-w-md mx-auto h-16 bg-slate-900/95 backdrop-blur-sm border-t border-slate-800 flex items-center justify-around px-4 z-40">
                        <button 
                            onClick={() => { setActiveScreen("feed"); setIsBottomSheetOpen(false); }}
                            className={`flex flex-col items-center justify-center gap-1 w-20 h-12 rounded-lg ${activeScreen === "feed" && !isBottomSheetOpen ? "text-blue-500 bg-blue-950/30" : "text-slate-500 hover:text-slate-300"}`}
                        >
                            <span className="text-[16px]">📰</span>
                            <span className="text-[10px] font-bold">Feed</span>
                        </button>
                        
                        <button 
                            onClick={() => setIsBottomSheetOpen(true)}
                            className={`flex flex-col items-center justify-center gap-1 w-20 h-12 rounded-lg ${isBottomSheetOpen ? "text-blue-500 bg-blue-950/30" : "text-slate-500 hover:text-slate-300"}`}
                        >
                            <span className="text-[16px]">⚙️</span>
                            <span className="text-[10px] font-bold">Filtros</span>
                        </button>
                    </nav>

                    {/* BOTTOM SHEET DE FILTROS FLUIDO */}
                    {isBottomSheetOpen && (
                        <>
                            {/* Overlay de fundo */}
                            <div className="absolute inset-0 bg-black/60 z-40 animate-fadeIn" onClick={() => setIsBottomSheetOpen(false)}></div>
                            
                            {/* Painel do Sheet */}
                            <div className="absolute inset-x-0 bottom-0 top-20 bg-slate-900 border-t border-slate-800 rounded-t-2xl z-50 flex flex-col shadow-2xl animate-slideInUp overflow-hidden">
                                <div className="h-12 flex items-center justify-between px-4 border-b border-slate-800 sticky top-0 bg-slate-900 z-10">
                                    <span className="text-xs font-bold font-mono text-slate-400">FILTROS & ALERTAS</span>
                                    <button 
                                        onClick={() => setIsBottomSheetOpen(false)}
                                        className="text-[11px] font-bold text-white px-4 py-1.5 bg-blue-600 rounded-lg active:scale-95 transition"
                                    >
                                        Aplicar
                                    </button>
                                </div>

                                <div className="flex-1 overflow-y-auto p-3 flex flex-col gap-3 pb-10">
                                    {filterTree.map(item => (
                                        // CORREÇÃO AQUI: Usando React Fragment para agrupar elementos irmãos
                                        <React.Fragment key={item.categoria}>
                                            {/* Linha da Categoria Mãe */}
                                            <div className="flex items-center gap-2 bg-slate-850 p-2 rounded-xl border border-slate-800">
                                                {/* Checkbox circular Categoria (Área de toque 44x44) */}
                                                <button 
                                                    onClick={() => toggleCategorySelection(item.categoria)}
                                                    className={`w-10 h-10 flex items-center justify-center flex-shrink-0 rounded-full border-2 transition active:scale-90 ${item.selected ? "bg-blue-500 text-white border-blue-600" : "bg-slate-900 border-slate-700 text-transparent"}`}
                                                >
                                                    <span className="text-sm font-bold">✓</span>
                                                </button>
                                                
                                                {/* Nome e Botão de Expandir */}
                                                <button 
                                                    onClick={() => toggleCategoryExpand(item.categoria)}
                                                    className="flex-1 flex items-center justify-between p-1 h-10 text-left"
                                                >
                                                    <span className="text-[12px] font-bold text-white">{item.categoria}</span>
                                                    <div className={`transition-transform duration-200 ${item.isOpen ? "rotate-180 text-blue-400" : "rotate-0 text-slate-500"}`}>
                                                        <IconChevronDown />
                                                    </div>
                                                </button>
                                            </div>

                                            {/* Lista de Subcategorias (Recolhível) */}
                                            {item.isOpen && (
                                                <div className="pl-4 pr-1 flex flex-col gap-1 animate-fadeIn overflow-hidden">
                                                    {item.subcategorias.map(sub => {
                                                        const isActive = item.activeSubs.includes(sub);
                                                        const isAlerted = activeAlerts.includes(sub);
                                                        return (
                                                            <div key={sub} className="flex items-center justify-between py-1 px-1 border-b border-slate-800/50 last:border-b-0 h-12 gap-2 hover:bg-slate-850/40 rounded-lg">
                                                                <div className="flex items-center gap-2.5 flex-1 transition" onClick={() => toggleSubcategory(item.categoria, sub)}>
                                                                    {/* Checkbox circular sub (Área de toque 44x44 similhante) */}
                                                                    <div 
                                                                        className={`w-9 h-9 flex items-center justify-center flex-shrink-0 rounded-full border-2 transition active:scale-90 cursor-pointer ${isActive ? "bg-blue-600 text-white border-blue-500" : "bg-slate-950 border-slate-800 text-transparent"}`}
                                                                    >
                                                                        <span className="text-xs font-bold">✓</span>
                                                                    </div>
                                                                    <span className={`text-[11px] font-medium transition ${isActive ? "text-slate-100" : "text-slate-500"}`}>{sub}</span>
                                                                </div>

                                                                {/* Sino de Alerta (Área de toque 44x44) */}
                                                                <button 
                                                                    onClick={() => toggleAlert(sub)}
                                                                    className={`w-10 h-10 flex items-center justify-center rounded-lg transition active:scale-90 ${isAlerted ? "text-amber-400 bg-amber-950/40 border border-amber-900" : "text-slate-600 hover:text-slate-400 bg-slate-950 border border-slate-800"}`}
                                                                >
                                                                    <IconAlert />
                                                                </button>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            )}
                                            
                                            {/* Divisor simples */}
                                            <div className="h-px bg-slate-800/50 my-1"></div>
                                        </React.Fragment>
                                    ))}
                                </div>
                            </div>
                        </>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
    </script>
    
    <style>
        @keyframes slideInUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .animate-slideInUp {
            animation: slideInUp 0.3s ease-out forwards;
        }
        .animate-fadeIn {
            animation: fadeIn 0.2s ease-out forwards;
        }
        
        /* Ajuste de scroll para mobile */
        main {
            -webkit-overflow-scrolling: touch;
        }
    </style>
</body>
</html>
