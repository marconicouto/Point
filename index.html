<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Point das Milhas | App Mobile</title>
    
    <!-- Meta tags PWA / Tela Cheia -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Point Milhas">
    <meta name="theme-color" content="#0f3a5f">
    <link rel="manifest" href="./manifest.json">
    
    <link rel="icon" type="image/png" href="https://ais-dev-er44kh4o5vh7gueuj6tubg-427304860856.us-west2.run.app/assets/images/Icone_Point.PNG">
    <link rel="apple-touch-icon" href="https://ais-dev-er44kh4o5vh7gueuj6tubg-427304860856.us-west2.run.app/assets/images/Icone_Point.PNG">

    <!-- Bibliotecas via CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2.39.8/dist/umd/supabase.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { dark: '#0f3a5f', blue: '#1a73e8' }
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.2s ease-out forwards',
                        'slide-left': 'slideLeft 0.3s cubic-bezier(0, 0, 0.2, 1) forwards',
                        'pulse-slow': 'pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        fadeIn: { 'from': { opacity: '0' }, 'to': { opacity: '1' } },
                        slideLeft: { 'from': { transform: 'translateX(100%)' }, 'to': { transform: 'translateX(0)' } }
                    }
                }
            }
        }
    </script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body {
            -webkit-tap-highlight-color: transparent;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0; padding: 0;
            background-color: #f3f4f6;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        .safe-pb { padding-bottom: env(safe-area-inset-bottom); }
        .pt-safe { padding-top: env(safe-area-inset-top); }
        ::-webkit-scrollbar { display: none; }
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>

    <script>
      // Registro do Service Worker e Permissão de Notificação
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js').then(reg => {
            console.log('SW registrado com sucesso');
            if ('Notification' in window && Notification.permission === 'default') {
              Notification.requestPermission();
            }
          }).catch(err => console.log('Erro ao registrar SW:', err));
        });
      }
    </script>
</head>
<body class="antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const SUPABASE_URL = "https://pifarsxbrfwvmvlwvtnk.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpZmFyc3hicmZ3dm12bHd2dG5rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2NDg0OTYsImV4cCI6MjA5NTIyNDQ5Nn0.xrgI7q8z0Yew70kxZzWz4v8IiF_eHSY97Ed2NxvTwWw";
        const VAPID_PUBLIC_KEY = "BOmW8M6X3P7z7v9Hk2J4L5N6Q7R8S9T0U1V2W3X4Y5Z6A7B8C9D0E1F2G3H4I5J6K7L8M9N0O1P2Q3R4S5T6U7V8W9X0Y1Z";

        // Ícones em SVG do Lucide para evitar carregar biblioteca extra
        const Icons = {
            Bell: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>,
            Check: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
            ChevronDown: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>,
            Settings: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.1a2 2 0 0 1-1-1.72v-.51a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>,
            ExternalLink: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>,
            Star: ({fill}) => <svg width="24" height="24" viewBox="0 0 24 24" fill={fill || "none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>,
            Filter: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>,
            Info: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
        };

        function App() {
            const [posts, setPosts] = useState([]);
            const [isLoading, setIsLoading] = useState(false);
            const [activeScreen, setActiveScreen] = useState("feed");
            const [isBottomSheetOpen, setIsBottomSheetOpen] = useState(false);
            const [readingPost, setReadingPost] = useState(null);
            const [pullDistance, setPullDistance] = useState(0);
            const [favorites, setFavorites] = useState(() => JSON.parse(localStorage.getItem("point_pwa_favs") || "[]"));
            const [activeAlerts, setActiveAlerts] = useState(() => JSON.parse(localStorage.getItem("point_pwa_alerts") || "[]"));
            const [filterTree, setFilterTree] = useState([]);

            const touchStartY = useRef(0);
            const containerRef = useRef(null);

            useEffect(() => { localStorage.setItem("point_pwa_favs", JSON.stringify(favorites)); }, [favorites]);
            useEffect(() => { localStorage.setItem("point_pwa_alerts", JSON.stringify(activeAlerts)); }, [activeAlerts]);

            const categoryConfigs = useMemo(() => [
                { ordem: 10, cat: "Transferência Bonificada", subs: ["Smiles", "Latam", "Azul", "Avios", "Aadvantage", "Outros"] },
                { ordem: 20, cat: "Alteração de regras", subs: ["Smiles", "Latam", "Azul", "Avios", "Aadvantage", "Outros"] },
                { ordem: 30, cat: "Passagem com milhas", subs: ["Smiles", "Latam", "Azul", "Avios", "Aadvantage", "Outros"] },
                { ordem: 40, cat: "Passagem em dinheiro", subs: ["Brasil", "América do sul", "Caribe", "América do norte", "Europa", "Ásia", "África", "Oceania"] },
                { ordem: 50, cat: "Hotel", subs: ["Accor", "Marriott", "Hilton", "Hyatt", "Wyndham", "IHG", "Radisson", "Outros"] },
                { ordem: 60, cat: "Cartão de crédito", subs: ["Itaú", "Santander", "Bradesco", "Banco do Brasil", "Porto Bank", "Caixa", "C6 Bank", "XP e Rico", "Outros", "Anuidade grátis"] },
                { ordem: 80, cat: "Status match ou gratuito", subs: [] }
            ], []);

            useEffect(() => { fetchData(); }, []);

            useEffect(() => {
                const found = {};
                posts.forEach(p => {
                    const c = (p.categoria || "").trim();
                    const s = (p.subcategoria || "Geral").trim();
                    if (!c || c.toLowerCase() === "ignorado") return;
                    if (!found[c]) found[c] = [];
                    if (!found[c].includes(s)) found[c].push(s);
                });

                const newTree = categoryConfigs.map(config => {
                    const subsInDb = found[config.cat] || [];
                    const allSubs = Array.from(new Set([...config.subs, ...subsInDb]));
                    const sortedSubs = allSubs.sort((a,b) => config.subs.indexOf(a) - config.subs.indexOf(b));
                    return {
                        categoria: config.cat,
                        subcategorias: sortedSubs,
                        isOpen: true,
                        selected: true,
                        activeSubs: [...sortedSubs]
                    };
                });
                setFilterTree(newTree);
            }, [posts, categoryConfigs]);

            const fetchData = async () => {
                setIsLoading(true);
                try {
                    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                    const { data } = await sb.from("news").select("*").order("published_at", { ascending: false }).limit(60);
                    if (data) setPosts(data);
                } catch(e) { console.error(e); }
                setIsLoading(false);
            };

            const subscribeToPush = async (cat, sub) => {
                if (!('serviceWorker' in navigator)) return;
                try {
                    const reg = await navigator.serviceWorker.ready;
                    const subscr = await reg.pushManager.subscribe({
                        userVisibleOnly: true,
                        applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
                    });
                    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                    await sb.from("push_subscriptions").upsert({
                        subscription: subscr, category: cat, subcategory: sub, updated_at: new Date().toISOString()
                    }, { onConflict: 'subscription' });
                } catch(e) { console.error("Push Error", e); }
            };

            const urlBase64ToUint8Array = (base64String) => {
                const padding = "=".repeat((4 - (base64String.length % 4)) % 4);
                const base64 = (base64String + padding).replace(/-/g, "+").replace(/_/g, "/");
                const rawData = window.atob(base64);
                const outputArray = new Uint8Array(rawData.length);
                for (let i = 0; i < rawData.length; ++i) outputArray[i] = rawData.charCodeAt(i);
                return outputArray;
            };

            const toggleAlert = async (cat, sub, e) => {
                if(e) e.stopPropagation();
                const key = cat + ":::" + sub;
                const willEnable = !activeAlerts.includes(key);
                if (willEnable) await subscribeToPush(cat, sub);
                setActiveAlerts(prev => prev.includes(key) ? prev.filter(k => k !== key) : [...prev, key]);
            };

            const getCategoryTheme = (categoryName) => {
                const lower = (categoryName || "").toLowerCase();
                const green = { badge: "bg-emerald-50 text-[#15803d] border border-emerald-200/80 font-extrabold", dot: "bg-emerald-600", checkbox: "bg-emerald-600 border-emerald-600" };
                const blue = { badge: "bg-blue-50 text-[#1a73e8] border border-blue-200 font-extrabold", dot: "bg-blue-600", checkbox: "bg-blue-600 border-blue-600" };
                const orange = { badge: "bg-orange-50 text-orange-700 border border-orange-200 font-bold", dot: "bg-orange-600", checkbox: "bg-orange-600 border-orange-600" };
                const purple = { badge: "bg-purple-50 text-purple-700 border border-purple-200/80 font-extrabold", dot: "bg-purple-600", checkbox: "bg-purple-600 border-purple-600" };
                const red = { badge: "bg-red-50 text-red-700 border border-red-200/80 font-bold", dot: "bg-red-600", checkbox: "bg-red-600 border-red-600" };
                
                if (lower.includes("transferência bonificada") || lower.includes("transfência bonificada")) return green;
                if (lower.includes("dinheiro") || lower.includes("passagem com milhas")) return blue;
                if (lower.includes("cartão") || lower.includes("credito")) return orange;
                if (lower.includes("hotel")) return purple;
                if (lower.includes("alteração") || lower.includes("regras")) return red;
                return blue;
            };

            const filteredPosts = posts.filter(p => {
                const cat = (p.categoria || "").trim();
                const sub = (p.subcategoria || "Geral").trim();
                const node = filterTree.find(n => n.categoria === cat);
                if (!node) return true;
                return node.activeSubs.includes(sub);
            });

            return (
                <div className="flex flex-col h-[100dvh] w-full md:max-w-md mx-auto bg-white relative overflow-hidden shadow-2xl">
                    <header className="h-14 bg-white border-b border-gray-100 flex items-center justify-between px-4 sticky top-0 z-40 shrink-0 pt-safe">
                        <div className="flex items-center gap-2">
                            <div className="w-8 h-8 rounded-lg bg-blue-50 flex items-center justify-center">
                                <img src="https://ais-dev-er44kh4o5vh7gueuj6tubg-427304860856.us-west2.run.app/assets/images/Icone_Point.PNG" className="w-6 h-6 object-contain" />
                            </div>
                            <span className="font-black text-blue-900 tracking-tighter uppercase text-sm">POINT MILHAS</span>
                        </div>
                        <button onClick={() => setIsBottomSheetOpen(true)} className="p-2 bg-gray-50 rounded-full text-blue-800">
                            <Icons.Filter />
                        </button>
                    </header>

                    <div ref={containerRef} className="flex-1 overflow-y-auto px-4 py-4 space-y-4 scrollbar-none pb-24">
                        {isLoading ? (
                            <div className="py-20 flex flex-col items-center justify-center gap-3">
                                <div className="w-6 h-6 border-2 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                                <span className="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Sincronizando...</span>
                            </div>
                        ) : filteredPosts.map(post => (
                            <div key={post.id} onClick={() => setReadingPost(post)} className="bg-white border border-gray-100 p-4 rounded-2xl shadow-sm active:scale-[0.98] transition">
                                <h3 className="text-sm font-extrabold text-gray-900 leading-snug mb-2">{post.title}</h3>
                                <div className="flex items-center justify-between text-[10px] font-bold text-gray-400 uppercase mb-3">
                                    <span>{post.source_site}</span>
                                    <span className="font-normal">{new Date(post.published_at).toLocaleDateString()}</span>
                                </div>
                                <div className="flex items-center justify-between pt-3 border-t border-gray-50">
                                    <span className={"text-[9px] px-3 py-1 rounded-full uppercase font-black tracking-widest " + getCategoryTheme(post.categoria).badge}>
                                        {post.categoria}
                                    </span>
                                    <Icons.Star fill={favorites.includes(post.id) ? "#fbbf24" : "none"} />
                                </div>
                            </div>
                        ))}
                    </div>

                    <nav className="absolute bottom-0 inset-x-0 h-16 bg-white border-t border-gray-100 grid grid-cols-2 safe-pb">
                        <button onClick={() => setActiveScreen("feed")} className={"flex flex-col items-center justify-center " + (activeScreen === "feed" ? "text-blue-600" : "text-gray-300")}>
                            <div className="w-6 h-6"><Icons.Settings /></div>
                            <span className="text-[9px] font-black uppercase tracking-widest mt-1">Feed</span>
                        </button>
                        <button onClick={() => setActiveScreen("alerts")} className={"flex flex-col items-center justify-center " + (activeScreen === "alerts" ? "text-blue-600" : "text-gray-300")}>
                            <div className="w-6 h-6 relative">
                                <Icons.Bell />
                                {activeAlerts.length > 0 && <div className="absolute -top-0.5 -right-0.5 w-2 h-2 bg-red-500 rounded-full border-white border animate-pulse"></div>}
                            </div>
                            <span className="text-[9px] font-black uppercase tracking-widest mt-1">Alertas</span>
                        </button>
                    </nav>

                    {/* READING MODE */}
                    {readingPost && (
                        <div className="absolute inset-x-0 top-0 bottom-0 bg-white z-[60] flex flex-col animate-fade-in">
                            <header className="h-14 bg-white border-b border-gray-100 flex items-center justify-between px-3 shrink-0 pt-safe">
                                <button onClick={() => setReadingPost(null)} className="w-10 h-10 flex items-center justify-center text-gray-400">←</button>
                                <span className="text-xs font-bold text-gray-900 truncate max-w-[200px]">{readingPost.title}</span>
                                <a href={readingPost.url} target="_blank" className="p-2 text-blue-600"><Icons.ExternalLink /></a>
                            </header>
                            <iframe src={readingPost.url} className="flex-1 w-full border-none bg-gray-50" />
                        </div>
                    )}

                    {/* FILTER DRAWER */}
                    {isBottomSheetOpen && (
                        <div className="absolute inset-0 z-[70] flex animate-fade-in overflow-hidden">
                            <div className="w-[20%] h-full bg-black/40" onClick={() => setIsBottomSheetOpen(false)}></div>
                            <div className="w-[80%] h-full bg-white shadow-2xl animate-slide-left flex flex-col">
                                <header className="h-12 bg-gray-50 border-b border-gray-100 flex items-center justify-between px-4 shrink-0 pt-safe">
                                    <span className="text-[10px] font-black text-gray-500 uppercase tracking-widest">FILTROS</span>
                                    <button onClick={() => setIsBottomSheetOpen(false)} className="text-blue-600 font-bold text-xs uppercase">OK</button>
                                </header>
                                <div className="flex-1 overflow-y-auto p-4 space-y-4">
                                    {filterTree.map(item => {
                                        const theme = getCategoryTheme(item.categoria);
                                        return (
                                            <div key={item.categoria} className="space-y-1">
                                                <div className="bg-gray-50 p-2 rounded-xl flex items-center justify-between border border-gray-100">
                                                    <div className="flex items-center gap-2">
                                                        <div className={"w-5 h-5 rounded border transition " + theme.checkbox}></div>
                                                        <span className="text-[11px] font-black text-gray-900 uppercase">{item.categoria}</span>
                                                    </div>
                                                </div>
                                                <div className="pl-4 space-y-2 py-2">
                                                    {item.subcategorias.map(sub => (
                                                        <div key={sub} className="flex items-center justify-between py-1 border-b border-gray-50 last:border-none">
                                                            <span className="text-xs font-bold text-gray-600">{sub}</span>
                                                            <button onClick={(e) => toggleAlert(item.categoria, sub, e)} className={"p-2 rounded-full " + (activeAlerts.includes(item.categoria + ":::" + sub) ? "text-red-500 bg-red-50" : "text-gray-300")}>
                                                                <div className="w-3.5 h-3.5"><Icons.Bell /></div>
                                                            </button>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
