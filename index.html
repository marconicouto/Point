<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Point das Milhas PWA</title>
    <!-- Bibliotecas Necessárias via CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- @supabase/supabase-js cliente oficial -->
    <script src="https://unpkg.com/@supabase/supabase-js@2.39.8/dist/umd/supabase.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            dark: '#0f3a5f',
                            medium: '#1d4ed8'
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #F1F3F4;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        /* Ocultar barra de rolagem estética */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #F1F3F4;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 99px;
        }
    </style>
</head>
<body class="bg-[#F1F3F4] text-gray-900 antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // IMPORTANTE: COLOQUE AQUI SUAS CREDENCIAIS DO SUPABASE PARA LER A TABELA 'news'
        const SUPABASE_URL = "https://pifarsxbrfwvmvlwvtnk.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpZmFyc3hicmZ3dm12bHd2dG5rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2NDg0OTYsImV4cCI6MjA5NTIyNDQ5Nn0.xrgI7q8z0Yew70kxZzWz4v8IiF_eHSY97Ed2NxvTwWw";

        function App() {
            const [posts, setPosts] = useState([]);
            const [isLoading, setIsLoading] = useState(false);
            const [activeScreen, setActiveScreen] = useState("feed");
            const [isBottomSheetOpen, setIsBottomSheetOpen] = useState(false);
            const [readingPost, setReadingPost] = useState(null);
            const [lastRefreshTime, setLastRefreshTime] = useState(new Date().toLocaleTimeString());
            const [secondsToRefresh, setSecondsToRefresh] = useState(1200);
            
            // Gestão de Favoritos local storage na PWA
            const [favorites, setFavorites] = useState(() => {
                try {
                    return JSON.parse(localStorage.getItem("point_feed_favorites") || "[]");
                } catch {
                    return [];
                }
            });

            const toggleFavorite = (postUrl, e) => {
                e.stopPropagation();
                setFavorites(prev => {
                    const next = prev.includes(postUrl) ? prev.filter(p => p !== postUrl) : [...prev, postUrl];
                    localStorage.setItem("point_feed_favorites", JSON.stringify(next));
                    return next;
                });
            };

            // Gestos para Puxar e Atualizar (Pull to Refresh) na PWA
            const [pullDistance, setPullDistance] = useState(0);
            const touchStartY = useRef(0);
            const containerRef = useRef(null);

            const handleTouchStart = (e) => {
                const isAtTop = containerRef.current ? containerRef.current.scrollTop === 0 : true;
                if (isAtTop) {
                    touchStartY.current = e.touches[0].clientY;
                } else {
                    touchStartY.current = -1;
                }
            };

            const handleTouchMove = (e) => {
                if (touchStartY.current === -1) return;
                const currentY = e.touches[0].clientY;
                const diff = currentY - touchStartY.current;
                if (diff > 0) {
                    const pull = Math.min(diff * 0.4, 80);
                    setPullDistance(pull);
                }
            };

            const handleTouchEnd = () => {
                if (pullDistance >= 50) {
                    fetchNewsFromSupabase();
                }
                setPullDistance(0);
            };

            // Filtros dinâmicos que iniciam vazios de forma que apenas categorias existentes no supabase apareçam
            const [filterTree, setFilterTree] = useState([]);
            const [activeAlerts, setActiveAlerts] = useState([]);

            useEffect(() => {
                fetchNewsFromSupabase();
                const interval = setInterval(() => {
                    setSecondsToRefresh(prev => {
                        if (prev <= 1) {
                            fetchNewsFromSupabase();
                            return 1200;
                        }
                        return prev - 1;
                    });
                }, 1000);
                return () => clearInterval(interval);
            }, []);

            // População dinâmica dos filtros baseada nos posts existentes
            useEffect(() => {
                if (posts.length === 0) return;
                const found = {};
                posts.forEach(p => {
                    const cat = p.categoria;
                    const sub = p.subcategoria;
                    if (!cat || !sub) return;
                    const c = cat.trim();
                    const s = sub.trim();
                    if (c.toLowerCase() === "ignorado" || s.toLowerCase() === "ignorado") return;
                    if (!found[c]) found[c] = [];
                    if (!found[c].includes(s)) found[c].push(s);
                });

                setFilterTree(prevTree => {
                    return Object.keys(found).map(cat => {
                        const subs = found[cat];
                        const existing = prevTree.find(item => item.categoria.toLowerCase() === cat.toLowerCase());
                        if (existing) {
                            const validActiveSubs = existing.activeSubs.filter(sub => subs.some(s => s.toLowerCase() === sub.toLowerCase()));
                            subs.forEach(sub => {
                                if (!existing.subcategorias.some(s => s.toLowerCase() === sub.toLowerCase())) {
                                    validActiveSubs.push(sub);
                                }
                            });
                            return {
                                categoria: cat,
                                subcategorias: subs,
                                isOpen: existing.isOpen,
                                selected: validActiveSubs.length === subs.length,
                                activeSubs: validActiveSubs
                            };
                        } else {
                            return {
                                categoria: cat,
                                subcategorias: subs,
                                isOpen: true,
                                selected: true,
                                activeSubs: [...subs]
                            };
                        }
                    });
                });
            }, [posts]);

            // Método Real Supabase API ou fallback local
            const fetchNewsFromSupabase = async () => {
                setIsLoading(true);
                try {
                    if (SUPABASE_URL && !SUPABASE_URL.includes("SUA_URL")) {
                        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                        const { data, error } = await sb
                            .from("news")
                            .select("*")
                            .order("published_at", { ascending: false });
                        
                        if (error) throw error;
                        if (data) {
                            setPosts(data);
                            setLastRefreshTime(new Date().toLocaleTimeString());
                        }
                    } else {
                        // Dados de Fallback qualificados
                        const mockData = [
                            {
                                id: 1,
                                title: "Livelo lança compre pontos com até 55% de desconto para assinantes",
                                url: "https://pontospravoar.com/compre-pontos",
                                published_at: new Date(Date.now() - 1000*60*15).toISOString(),
                                summary: "Oportunidade para gerar lotes de 1.000 pontos Livelo a valores competitivos.",
                                categoria: "Fidelidade Nacional",
                                subcategoria: "Transferência bonificada",
                                source_site: "pontospravoar.com"
                            },
                            {
                                id: 2,
                                title: "Dux Visa Infinite do BRB estende acesso a salas VIP gratuitas",
                                url: "https://passageirodeprimeira.com",
                                published_at: new Date(Date.now() - 1000*60*45).toISOString(),
                                summary: "Cartão de metal mais exclusivo do país mantém benefícios premium inalterados.",
                                categoria: "Cartões de Crédito",
                                subcategoria: "Passagem em dinheiro",
                                source_site: "passageirodeprimeira.com"
                            }
                        ];
                        setPosts(mockData);
                    }
                } catch(e) {
                    console.error("Falha ao recuperar notícias", e);
                } finally {
                    setIsLoading(false);
                }
            };

            const toggleCategory = (catName) => {
                setFilterTree(prev => prev.map(item => {
                    if (item.categoria === catName) {
                        const next = !item.selected;
                        return { ...item, selected: next, activeSubs: next ? [...item.subcategorias] : [] };
                    }
                    return item;
                }));
            };

            const toggleSubcategory = (catName, subName) => {
                setFilterTree(prev => prev.map(item => {
                    if (item.categoria === catName) {
                        const active = item.activeSubs.includes(subName);
                        const nextSubs = active ? item.activeSubs.filter(s => s !== subName) : [...item.activeSubs, subName];
                        return { ...item, activeSubs: nextSubs, selected: nextSubs.length === item.subcategorias.length };
                    }
                    return item;
                }));
            };

            const getFilteredPosts = () => {
                const activeSubs = filterTree.flatMap(item => item.activeSubs);
                const filtered = posts.filter(p => {
                    const cat = (p.categoria || "").trim().toLowerCase();
                    const sub = (p.subcategoria || "").trim().toLowerCase();
                    if (cat === "ignorado" || sub === "ignorado") return false;
                    return !p.subcategoria || activeSubs.includes(p.subcategoria);
                });
                return filtered.sort((a, b) => {
                    const keyA = a.link || a.url || a.id;
                    const keyB = b.link || b.url || b.id;
                    const aFav = favorites.includes(keyA);
                    const bFav = favorites.includes(keyB);
                    if (aFav && !bFav) return -1;
                    if (!aFav && bFav) return 1;
                    return new Date(b.published_at).getTime() - new Date(a.published_at).getTime();
                });
            };

            const getCategoryTheme = (categoryName) => {
                const name = (categoryName || "Geral").trim();
                const defaultStyle = {
                    badge: "bg-blue-50 text-blue-700 border border-blue-200 font-bold",
                    dot: "bg-blue-600",
                    border: "border-blue-300",
                    checkbox: "bg-blue-600 border-blue-700",
                    text: "text-blue-600",
                    bgLight: "bg-blue-50"
                };
                if (!name) return defaultStyle;

                const categoryLower = name.toLowerCase();

                if (categoryLower.includes("transferência bonificada") || categoryLower.includes("transfência bonificada")) {
                    return {
                        badge: "bg-emerald-50 text-[#15803d] border border-emerald-200/80 font-extrabold",
                        dot: "bg-emerald-600",
                        border: "border-emerald-300",
                        checkbox: "bg-emerald-600 border-emerald-600",
                        text: "text-[#15803d]",
                        bgLight: "bg-emerald-50"
                    };
                }

                if (categoryLower.includes("passagem em dinheiro")) {
                    return {
                        badge: "bg-blue-50 text-[#1a73e8] border border-blue-200 font-extrabold",
                        dot: "bg-[#1a73e8]",
                        border: "border-blue-300",
                        checkbox: "bg-[#1a73e8] border-[#1a73e8]",
                        text: "text-[#1a73e8]",
                        bgLight: "bg-blue-50"
                    };
                }

                if (categoryLower.includes("cartão") || categoryLower.includes("cartao") || categoryLower.includes("credito") || categoryLower.includes("crédito")) {
                    return {
                        badge: "bg-purple-50 text-[#7e22ce] border border-purple-200/80 font-bold",
                        dot: "bg-[#9333ea]",
                        border: "border-purple-300",
                        checkbox: "bg-[#9333ea] border-[#9333ea]",
                        text: "text-[#7e22ce]",
                        bgLight: "bg-purple-50"
                    };
                }
                if (categoryLower.includes("hotel") || categoryLower.includes("hotéis") || categoryLower.includes("hoteis")) {
                    return {
                        badge: "bg-pink-50 text-[#db2777] border border-pink-200/80 font-extrabold",
                        dot: "bg-[#db2777]",
                        border: "border-pink-300",
                        checkbox: "bg-[#db2777] border-[#db2777]",
                        text: "text-[#db2777]",
                        bgLight: "bg-pink-50"
                    };
                }
                }

                const styles = [
                    {
                        badge: "bg-blue-50 text-[#1a73e8] border border-blue-200 font-bold",
                        dot: "bg-[#1a73e8]",
                        border: "border-blue-300",
                        checkbox: "bg-[#1a73e8] border-[#1a73e8]",
                        text: "text-[#1a73e8]",
                        bgLight: "bg-blue-50"
                    },
                    {
                        badge: "bg-red-50 text-red-700 border border-red-200 font-bold",
                        dot: "bg-red-600",
                        border: "border-red-300",
                        checkbox: "bg-red-600 border-red-600",
                        text: "text-red-600",
                        bgLight: "bg-red-50"
                    },
                    {
                        badge: "bg-yellow-50 text-yellow-700 border border-yellow-200 font-bold",
                        dot: "bg-yellow-500",
                        border: "border-yellow-300",
                        checkbox: "bg-yellow-600 border-yellow-600",
                        text: "text-yellow-605",
                        bgLight: "bg-yellow-50"
                    },
                    {
                        badge: "bg-emerald-50 text-emerald-700 border border-emerald-200 font-bold",
                        dot: "bg-emerald-600",
                        border: "border-emerald-300",
                        checkbox: "bg-emerald-600 border-emerald-600",
                        text: "text-emerald-700",
                        bgLight: "bg-emerald-50"
                    }
                ];

                const sortedCategories = filterTree.map(t => t.categoria.trim().toLowerCase());
                const index = sortedCategories.indexOf(name.toLowerCase());
                if (index !== -1) {
                    return styles[index % styles.length];
                }
                return defaultStyle;
            };

            const getSubBadgeStyle = (subName, catName) => {
                const sub = (subName || "").toLowerCase().trim();
                if (sub.includes("transferência bonificada") || sub.includes("transfência bonificada")) {
                    return "bg-emerald-50 text-[#15803d] border border-emerald-200 font-bold";
                }
                if (sub.includes("passagem em dinheiro")) {
                    return "bg-blue-50 text-[#1a73e8] border border-blue-200 font-bold";
                }
                return getCategoryTheme(catName).badge;
            };

            const getSubCheckboxColor = (subName, catName) => {
                const sub = (subName || "").toLowerCase().trim();
                if (sub.includes("transferência bonificada") || sub.includes("transfência bonificada")) {
                    return "bg-emerald-600 border-emerald-600";
                }
                if (sub.includes("passagem em dinheiro")) {
                    return "bg-[#1a73e8] border-[#1a73e8]";
                }
                return getCategoryTheme(catName).checkbox;
            };

            const formatSourceName = (domain) => {
                if (!domain) return "Portal";
                const d = domain.toLowerCase();
                if (d.includes("passageirodeprimeira")) return "Passageiro de Primeira";
                if (d.includes("pontospravoar") || d.includes("pontos para voar")) return "Pontos pra Voar";
                if (d.includes("mestredasmilhas") || d.includes("mestre das milhas")) return "Mestre das Milhas";
                if (d.includes("meumilhaodemilhas") || d.includes("meumilhao")) return "Meu Milhão de Milhas";
                if (d.includes("melhorescartoes") || d.includes("melhores cartões")) return "Melhores Cartões";
                if (d.includes("cartoesdecredito") || d.includes("cartões de crédito")) return "Cartões de Crédito";
                return domain.replace(/^(https?:\/\/)?(www\.)?/, "").split("/")[0];
            };

            const getRelativeTime = (isoString) => {
                try {
                    const diffMs = Date.now() - new Date(isoString).getTime();
                    const diffMins = Math.floor(diffMs / (1000 * 60));
                    const diffHours = Math.floor(diffMs / (1000 * 60 * 60));

                    if (diffMins < 1) return "agora mesmo";
                    if (diffMins < 60) return "há " + diffMins + " min";
                    if (diffHours < 24) return "há " + diffHours + "h";
                    return new Date(isoString).toLocaleDateString("pt-BR", { day: "numeric", month: "short" });
                } catch {
                    return "há pouco";
                }
            };

            return (
                <div className="flex flex-col h-[100dvh] max-w-sm mx-auto bg-[#F1F3F4] border-x border-gray-200 relative shadow-2xl overflow-hidden">
                    
                    {/* CABEÇALHO CLEAN WHITE COM BOTOES DE FILTROS */}
                    <header className="sticky top-0 bg-white border-b border-gray-150 h-14 flex items-center justify-between px-4 z-40 shadow-sm shrink-0">
                        <div className="flex items-center gap-1.5">
                            <svg className="w-5 h-5 text-[#0f3a5f]" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M17.8 19.2 16 11l3.5-3.5c1.5-1.5 2-3.5 1.5-4s-2.5 0-4 1.5L13.5 8.5 5.3 6.7c-.8-.2-1.6.3-1.8 1.1-.1.5.1.9.4 1.2L9 13l-4 4v2l4-1 4 4h2l-1-4 4-4 4.1 4.1c.3.3.7.4 1.2.3.8-.2 1.3-1 1.1-1.8z"/></svg>
                            <span className="font-extrabold tracking-tight text-base font-sans uppercase bg-gradient-to-r from-[#0f3a5f] to-[#1d4ed8] bg-clip-text text-transparent leading-none">POINT DAS MILHAS</span>
                        </div>
                        
                        <div className="flex items-center gap-1.5">
                            <button 
                                onClick={() => setIsBottomSheetOpen(true)}
                                className="flex items-center gap-1.5 bg-[#0f3a5f]/10 hover:bg-[#0f3a5f]/20 text-[#0f3a5f] px-3.5 py-1.5 rounded-full text-xs font-semibold transition border border-[#0f3a5f]/20 shadow-sm active:scale-95 cursor-pointer"
                            >
                                <svg className="w-3 h-3 text-[#0f3a5f]" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
                                <span>Filtros</span>
                            </button>
                        </div>
                    </header>

                    {/* MIOLO COM SCROLL INDEPENDENTE E TOUCH REFRESH */}
                    {activeScreen === "feed" && (
                        <div 
                            ref={containerRef}
                            onTouchStart={handleTouchStart}
                            onTouchMove={handleTouchMove}
                            onTouchEnd={handleTouchEnd}
                            className="flex-1 overflow-y-auto px-3.5 py-3 pb-24 scrollbar-none"
                        >
                            {pullDistance > 10 && (
                                <div 
                                    className="flex items-center justify-center text-gray-500 py-2.5 transition-all duration-150 overflow-hidden shrink-0"
                                    style={{ height: pullDistance + 'px' }}
                                >
                                    <span className="text-[11px] font-bold text-gray-500 flex items-center gap-1.5 animate-pulse">
                                        <svg className="w-3.5 h-3.5 text-blue-600 animate-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/></svg>
                                        {pullDistance >= 50 ? "Solte para atualizar" : "Puxe para atualizar..."}
                                    </span>
                                </div>
                            )}

                            {isLoading && (
                                <div className="py-16 flex flex-col items-center justify-center text-gray-500 text-xs animate-pulse">
                                    <svg className="w-5 h-5 animate-spin text-blue-600 mb-2" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/></svg>
                                    Carregando últimas novidades...
                                </div>
                            )}

                            {!isLoading && getFilteredPosts().length === 0 ? (
                                <div className="py-20 text-center text-gray-500 text-xs px-6 border border-dashed border-gray-300 bg-white rounded-2xl shadow-sm">
                                    Nenhuma notícia atende aos filtros atuais. Modifique suas seleções no botão lateral de Filtros!
                                </div>
                            ) : (
                                <div className="flex flex-col gap-2.5">
                                    {getFilteredPosts().map(post => {
                                        return (
                                            <div 
                                                key={post.id || post.url || post.link}
                                                onClick={() => setReadingPost(post)}
                                                className="bg-white hover:bg-gray-50 border border-gray-200/80 p-3 text-left rounded-xl transition cursor-pointer flex flex-col gap-1 shadow-sm active:bg-gray-100"
                                            >
                                                <h3 className="text-[15px] font-bold text-gray-950 line-clamp-2 leading-snug tracking-tight font-sans">
                                                    {post.title}
                                                </h3>
                                                
                                                <div className="flex items-center justify-between text-xs text-gray-500 font-semibold mt-0.5">
                                                    <span>{formatSourceName(post.source_site || "")}</span>
                                                    <span className="font-mono text-[9.5px] text-gray-400">{getRelativeTime(post.published_at)}</span>
                                                </div>

                                                <div className="flex items-center justify-between mt-1.5 pt-1.5 border-t border-gray-100">
                                                    <span className={"font-mono text-[9px] px-3 py-0.5 rounded-full font-extrabold uppercase tracking-wide shrink-0 " + getCategoryTheme(post.categoria).badge}>
                                                        {post.categoria || "Milhas Geral"}
                                                    </span>
                                                    <button
                                                        onClick={(e) => toggleFavorite(post.link || post.url || post.id, e)}
                                                        className="p-1 transition"
                                                    >
                                                        <svg 
                                                            className={"w-4 h-4 " + (favorites.includes(post.link || post.url || post.id) ? "fill-[#fbbc05] text-[#fbbc05]" : "text-gray-300")}
                                                            viewBox="0 0 24 24"
                                                            fill="none"
                                                            stroke="currentColor"
                                                            strokeWidth="2.5"
                                                        >
                                                            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
                                                        </svg>
                                                    </button>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            )}
                        </div>
                    )}

                     {/* ALERTA SISTÊMICO PUSH */}
                    {activeScreen === "alerts" && (
                        <div className="flex-1 overflow-y-auto px-3.5 py-4 pb-24 text-left bg-[#F1F3F4]">
                            <h3 className="text-sm font-extrabold text-gray-800 uppercase tracking-wider mb-3 border-b border-gray-200 pb-2 flex items-center gap-1.5">
                                <svg className="w-4 h-4 text-blue-600 animate-pulse" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 0 1-3.46 0"/></svg> Alertas Ativos
                            </h3>

                            <p className="text-xs text-gray-700 font-semibold mb-4 leading-relaxed font-sans">
                                Você receberá alertas push no celular sempre que surgir uma nova notícia nas seguintes categorias.
                            </p>

                            <div className="space-y-2 flex flex-col">
                                {activeAlerts.length === 0 ? (
                                    <em className="text-xs text-gray-400 block py-8 text-center bg-white rounded-xl border border-gray-200 shadow-sm">Nenhum alerta ativo.</em>
                                ) : (
                                    activeAlerts.map(al => {
                                        const parts = al.split(":::");
                                        const categoryName = parts[0] || "Geral";
                                        const subcategoryName = parts[1] || "";
                                        const theme = getCategoryTheme(categoryName);
                                        return (
                                            <div key={al} className="bg-white border border-gray-200 p-3 rounded-xl flex items-center justify-between shadow-sm">
                                                <div className="flex-1 pr-2">
                                                    <div className="flex flex-col gap-1.5 text-left">
                                                        <div className="flex items-center gap-2">
                                                            <span className={"w-2.5 h-2.5 rounded-full animate-pulse shrink-0 " + theme.dot} />
                                                            <span className="text-sm font-extrabold text-[#0f3a5f]">{categoryName}</span>
                                                        </div>
                                                        <div className="pl-4.5">
                                                            <span className="text-xs text-gray-700 font-bold">Subcategoria: {subcategoryName}</span>
                                                        </div>
                                                    </div>
                                                </div>
                                                <button
                                                    onClick={() => {
                                                        setActiveAlerts(prev => prev.filter(a => a !== al));
                                                    }}
                                                    className="text-xs text-red-500 hover:text-red-700 font-extrabold hover:underline cursor-pointer"
                                                >
                                                    Desativar
                                                </button>
                                            </div>
                                        );
                                    })
                                )}
                            </div>
                        </div>
                    )}

                    {/* MODAL MODO LEITURA PWA */}
                    {readingPost && (
                        <div className="absolute inset-x-0 top-0 bottom-0 bg-white z-50 flex flex-col">
                            <div className="h-14 bg-white border-b border-gray-150 flex items-center justify-between px-2 shrink-0">
                                <button 
                                    onClick={() => setReadingPost(null)}
                                    style={{ width: "44px", height: "44px" }}
                                    className="flex items-center justify-center text-gray-650 hover:text-gray-950 hover:bg-gray-100 rounded-full transition active:scale-95 shrink-0"
                                >
                                    <svg className="w-5 h-5 text-blue-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                                </button>
                                
                                <div className="text-center max-w-[170px]">
                                    <span className="text-[9px] text-[#1a73e8] font-bold block">POINT DAS MILHAS</span>
                                    <span className="text-[10px] font-bold text-gray-900 block truncate leading-none mt-0.5">{readingPost.title}</span>
                                </div>

                                <a 
                                    href={readingPost.url || readingPost.link}
                                    target="_blank"
                                    rel="noopener noreferrer"
                                    className="text-xs text-blue-600 bg-blue-50 hover:bg-blue-100 px-3 py-1.5 rounded-md font-extrabold transition shrink-0 uppercase tracking-wider"
                                >
                                    ABRIR LINK
                                </a>
                            </div>

                            <div className="flex-1 bg-white overflow-hidden relative flex flex-col justify-between">
                                <div className="bg-blue-50 text-blue-900 p-2.5 text-xs border-b border-blue-105 text-left shrink-0">
                                    <div className="flex items-start gap-1">
                                        <svg className="w-3.5 h-3.5 text-blue-600 shrink-0 mt-0.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
                                        <span className="leading-relaxed font-semibold">Se o site não carregar, clique no botão ABRIR LINK.</span>
                                    </div>
                                </div>
                                
                                <iframe 
                                    src={readingPost.url || readingPost.link}
                                    className="flex-1 w-full border-none h-full bg-gray-50"
                                    sandbox="allow-scripts allow-same-origin allow-popups"
                                />
                            </div>
                        </div>
                    )}

                    {/* BARRA DE NAVEGAÇÃO INFERIOR FIXA - GRID DE 2 COLUNAS */}
                    <nav className="absolute bottom-0 inset-x-0 h-14 bg-white border-t border-gray-150 grid grid-cols-2 items-center justify-items-center z-40 rounded-b-none px-4 shrink-0 shadow-md text-[#0f3a5f]">
                        <button 
                            onClick={() => { setActiveScreen("feed"); setIsBottomSheetOpen(false); }}
                            className="w-full h-full flex flex-col items-center justify-center gap-1 transition"
                        >
                            <svg className={"w-5 h-5 " + (activeScreen === "feed" ? "text-[#0f3a5f]" : "text-[#0f3a5f]/50")} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20M4 19.5A2.5 2.5 0 0 1 2 17M4 19.5V4A2.5 2.5 0 0 1 6.5 1.5H20v13H6.5"/></svg>
                            <span className={"text-[10px] font-extrabold " + (activeScreen === "feed" ? "bg-gradient-to-r from-[#0f3a5f] to-[#1d4ed8] bg-clip-text text-transparent" : "text-[#0f3a5f]/50")}>Notícias</span>
                        </button>
                        
                        <button 
                            onClick={() => { setActiveScreen("alerts"); setIsBottomSheetOpen(false); }}
                            className="w-full h-full flex flex-col items-center justify-center gap-1 transition"
                        >
                            <div className="relative">
                                <svg className={"w-5 h-5 " + (activeScreen === "alerts" ? "text-[#0f3a5f]" : "text-[#0f3a5f]/50")} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                                {activeAlerts.length > 0 && (
                                    <span className="absolute -top-1.5 -right-1.5 w-2.5 h-2.5 bg-red-500 text-white font-black text-[7px] flex items-center justify-center rounded-full border border-white">
                                        {activeAlerts.length}
                                    </span>
                                )}
                            </div>
                            <span className={"text-[10px] font-extrabold " + (activeScreen === "alerts" ? "bg-gradient-to-r from-[#0f3a5f] to-[#1d4ed8] bg-clip-text text-transparent" : "text-[#0f3a5f]/50")}>Alertas</span>
                        </button>
                    </nav>

                    {/* FILTROS DRAWER À DIREITA COBRINDO 80% DA TELA */}
                    {isBottomSheetOpen && (
                        <div className="absolute inset-0 z-50 flex overflow-hidden font-sans text-gray-900 rounded-none">
                            {/* Left 20% overlay */}
                            <div 
                                className="w-[20%] h-full bg-black/40 backdrop-blur-[2px] cursor-pointer"
                                onClick={() => setIsBottomSheetOpen(false)}
                            />
                            
                            {/* Right 80% drawer */}
                            <div className="w-[80%] h-full bg-white flex flex-col shadow-2xl border-l border-gray-200 overflow-hidden pt-6">
                                <div className="h-14 bg-gray-50 border-b border-gray-200 flex items-center justify-between px-4 shrink-0">
                                    <div className="flex items-center gap-1.5">
                                        <span className="w-2 h-2 rounded-full bg-blue-600 animate-pulse" />
                                        <span className="text-xs font-extrabold text-gray-800 uppercase tracking-wider font-sans">FILTROS DAS MILHAS</span>
                                    </div>
                                    <button
                                        onClick={() => setIsBottomSheetOpen(false)}
                                        className="text-xs text-gray-500 hover:text-gray-950 border border-gray-300 bg-white hover:bg-gray-100 px-2.5 py-1 rounded-md transition font-semibold"
                                    >
                                        Fechar
                                    </button>
                                </div>

                                <div className="flex-1 overflow-y-auto p-4 space-y-4">
                                    <div className="bg-blue-50 text-blue-900 p-3 text-[13px] rounded-xl border border-blue-100 flex items-start gap-1.5 mb-2 leading-relaxed font-semibold">
                                        <svg className="w-4 h-4 text-blue-600 shrink-0 mt-0.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
                                        <span>Selecione as categorias que deseja ver no feed e marque o sino para receber alertas.</span>
                                    </div>

                                    {filterTree.length === 0 ? (
                                        <div className="py-8 text-center text-gray-400 text-xs font-semibold">Nenhum dado encontrado para filtrar...</div>
                                    ) : (
                                        filterTree.map(item => {
                                            const theme = getCategoryTheme(item.categoria);
                                            return (
                                                <div key={item.categoria} className="flex flex-col gap-1 border-b border-gray-150 pb-2.5">
                                                    {/* Parent category */}
                                                    <div className="flex items-center justify-between bg-gray-50/80 p-1.5 rounded-xl border border-gray-200 shadow-sm">
                                                        <button
                                                            onClick={() => toggleCategory(item.categoria)}
                                                            style={{ width: "36px", height: "36px" }}
                                                            className="flex items-center justify-center shrink-0 cursor-pointer bg-transparent border-none"
                                                        >
                                                            <div className={"w-6.5 h-6.5 rounded-full border transition-all flex items-center justify-center " + (
                                                                item.selected ? theme.checkbox + " text-white" : "bg-white border-gray-300"
                                                            )}>
                                                                <svg className="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><polyline points="20 6 9 17 4 12"/></svg>
                                                            </div>
                                                        </button>

                                                        <div 
                                                            className="flex-1 pl-2 text-left select-none flex items-center gap-1.5 cursor-pointer"
                                                            onClick={() => {
                                                                setFilterTree(prev => prev.map(f => f.categoria === item.categoria ? { ...f, isOpen: !f.isOpen } : f));
                                                            }}
                                                        >
                                                            <span className={"w-2 h-2 rounded-full shrink-0 " + theme.dot} />
                                                            <div>
                                                                <span className="text-[14px] font-extrabold text-gray-950 block leading-tight">{item.categoria}</span>
                                                                <span className="text-[11px] text-gray-500 block">{item.activeSubs.length} de {item.subcategorias.length} marcados</span>
                                                            </div>
                                                        </div>
                                                    </div>

                                                    {/* Subcategories list */}
                                                    {item.isOpen && (
                                                        <div className="pl-3.5 space-y-1.5 border-l border-gray-200 ml-4.5 pt-1.5">
                                                            {item.subcategorias.map(sub => {
                                                                const active = item.activeSubs.includes(sub);
                                                                const alerted = activeAlerts.includes(item.categoria + ":::" + sub);
                                                                const checkboxColorClass = getSubCheckboxColor(sub, item.categoria);
                                                                return (
                                                                    <div key={sub} className="flex items-center justify-between py-1 border-b border-gray-50">
                                                                        <div className="flex items-center">
                                                                            <button
                                                                                onClick={() => toggleSubcategory(item.categoria, sub)}
                                                                                style={{ width: "32px", height: "32px" }}
                                                                                className="flex items-center justify-center cursor-pointer bg-transparent border-none"
                                                                            >
                                                                                <div className={"w-5 h-5 rounded-full border transition-all flex items-center justify-center " + (
                                                                                    active ? checkboxColorClass + " text-white" : "bg-white border-gray-300"
                                                                                )}>
                                                                                    <svg className="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3.5"><polyline points="20 6 9 17 4 12"/></svg>
                                                                                </div>
                                                                            </button>
                                                                            <span className="text-[13.5px] text-gray-850 font-semibold pl-1.5 leading-snug">{sub}</span>
                                                                        </div>

                                                                        <button
                                                                            onClick={() => {
                                                                                const alertKey = item.categoria + ":::" + sub;
                                                                                setActiveAlerts(prev => prev.includes(alertKey) ? prev.filter(a => a !== alertKey) : [...prev, alertKey]);
                                                                            }}
                                                                            style={{ width: "32px", height: "32px" }}
                                                                            className={"flex items-center justify-center rounded-full transition " + (
                                                                                alerted ? "text-red-500 bg-red-50" : "text-gray-400 hover:text-gray-600 hover:bg-gray-100"
                                                                            )}
                                                                        >
                                                                            <svg className="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                                                                        </button>
                                                                    </div>
                                                                );
                                                            })}
                                                        </div>
                                                    )}
                                                </div>
                                            );
                                        })
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        // Inicializa ícones do Lucide
        setTimeout(() => {
            if (window.lucide) {
                window.lucide.createIcons();
            }
        }, 805);
    </script>
</body>
</html>
