<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Point das Milhas</title>
    <!-- Bibliotecas Necessárias via CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- @supabase/supabase-js cliente oficial -->
    <script src="https://unpkg.com/@supabase/supabase-js@2.39.8/dist/umd/supabase.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            dark: '#0f3a5f',
                            medium: '#1d4ed8'
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #F1F3F4;
            overflow: hidden;
        }
        /* Ocultar barra de rolagem estética */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #F1F3F4;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 99px;
        }
    </style>
</head>
<body class="bg-[#F1F3F4] text-gray-900 antialiased select-none">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // IMPORTANTE: COLOQUE AQUI SUAS CREDENCIAIS DO SUPABASE PARA LER A TABELA 'news'
        const SUPABASE_URL = "https://pifarsxbrfwvmvlwvtnk.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpZmFyc3hicmZ3dm12bHd2dG5rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2NDg0OTYsImV4cCI6MjA5NTIyNDQ5Nn0.xrgI7q8z0Yew70kxZzWz4v8IiF_eHSY97Ed2NxvTwWw";

        function App() {
            const [posts, setPosts] = useState([]);
            const [isLoading, setIsLoading] = useState(false);
            const [activeScreen, setActiveScreen] = useState("feed");
            const [isBottomSheetOpen, setIsBottomSheetOpen] = useState(false);
            const [readingPost, setReadingPost] = useState(null);
            const [lastRefreshTime, setLastRefreshTime] = useState(new Date().toLocaleTimeString());
            const [secondsToRefresh, setSecondsToRefresh] = useState(1200);

            // Filtros com checkbox 100% circular
            const [filterTree, setFilterTree] = useState([
                {
                    categoria: "Cartões de Crédito",
                    subcategorias: ["Acúmulo", "Benefícios", "Isenção de Anuidade", "Adesão"],
                    isOpen: true,
                    selected: true,
                    activeSubs: ["Acúmulo", "Benefícios", "Isenção de Anuidade", "Adesão"]
                },
                {
                    categoria: "Fidelidade Nacional",
                    subcategorias: ["Transferência Bonificada", "Compra de Pontos", "Resgate de Voos"],
                    isOpen: true,
                    selected: true,
                    activeSubs: ["Transferência Bonificada", "Compra de Pontos", "Resgate de Voos"]
                },
                {
                    categoria: "Fidelidade Internacional",
                    subcategorias: ["Bônus de Envio", "Alianças Aéreas", "Tabela Fixa"],
                    isOpen: false,
                    selected: false,
                    activeSubs: []
                }
            ]);

            const [activeAlerts, setActiveAlerts] = useState(["Transferência Bonificada"]);

            useEffect(() => {
                fetchNewsFromSupabase();
                const interval = setInterval(() => {
                    setSecondsToRefresh(prev => {
                        if (prev <= 1) {
                            fetchNewsFromSupabase();
                            return 1200;
                        }
                        return prev - 1;
                    });
                }, 1000);
                return () => clearInterval(interval);
            }, []);

            useEffect(() => {
                if (posts.length === 0) return;
                const found = {};
                posts.forEach(p => {
                    const cat = p.categoria;
                    const sub = p.subcategoria;
                    if (!cat || !sub) return;
                    const c = cat.trim();
                    const s = sub.trim();
                    if (c.toLowerCase() === "ignorado" || s.toLowerCase() === "ignorado") return;
                    if (!found[c]) found[c] = [];
                    if (!found[c].includes(s)) found[c].push(s);
                });

                setFilterTree(prev => {
                    let isChanged = false;
                    const nextTree = prev.map(item => {
                        const existingCat = Object.keys(found).find(c => c.toLowerCase() === item.categoria.toLowerCase());
                        if (existingCat) {
                            const newSubs = [...item.subcategorias];
                            const newActive = [...item.activeSubs];
                            found[existingCat].forEach(sub => {
                                if (!item.subcategorias.some(s => s.toLowerCase() === sub.toLowerCase())) {
                                    newSubs.push(sub);
                                    newActive.push(sub);
                                    isChanged = true;
                                }
                            });
                            return { ...item, subcategorias: newSubs, activeSubs: newActive, selected: newActive.length === newSubs.length };
                        }
                        return item;
                    });

                    Object.keys(found).forEach(cat => {
                        const hasCat = prev.some(item => item.categoria.toLowerCase() === cat.toLowerCase());
                        if (!hasCat) {
                            nextTree.push({
                                categoria: cat,
                                subcategorias: found[cat],
                                isOpen: true,
                                selected: true,
                                activeSubs: [...found[cat]]
                            });
                            isChanged = true;
                        }
                    });

                    return isChanged ? nextTree : prev;
                });
            }, [posts]);

            // Método Real Supabase API
            const fetchNewsFromSupabase = async () => {
                setIsLoading(true);
                try {
                    if (SUPABASE_URL && !SUPABASE_URL.includes("SUA_URL")) {
                        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                        const { data, error } = await sb
                            .from("news")
                            .select("*")
                            .order("published_at", { ascending: false });
                        
                        if (error) throw error;
                        if (data) {
                            setPosts(data);
                            setLastRefreshTime(new Date().toLocaleTimeString());
                        }
                    } else {
                        // Dados de Fallback sofisticados de portais de milhas reais
                        const mockData = [
                            {
                                id: 1,
                                title: "Livelo lança compre pontos com até 55% de desconto para assinantes",
                                url: "https://pontospravoar.com/compre-pontos",
                                published_at: new Date(Date.now() - 1000*60*15).toISOString(),
                                summary: "Oportunidade para gerar lotes de 1.000 pontos Livelo a valores competitivos.",
                                categoria: "Fidelidade Nacional",
                                subcategoria: "Compra de Pontos",
                                source_site: "pontospravoar.com"
                            },
                            {
                                id: 2,
                                title: "Dux Visa Infinite do BRB estende acesso a salas VIP gratuitas",
                                url: "https://passageirodeprimeira.com",
                                published_at: new Date(Date.now() - 1000*60*45).toISOString(),
                                summary: "Cartão de metal mais exclusivo do país mantém benefícios premium inalterados.",
                                categoria: "Cartões de Crédito",
                                subcategoria: "Benefícios",
                                source_site: "passageirodeprimeira.com"
                            }
                        ];
                        setPosts(mockData);
                    }
                } catch(e) {
                    console.error("Falha ao recuperar notícias", e);
                } finally {
                    setIsLoading(false);
                }
            };

            const toggleCategory = (catName) => {
                setFilterTree(prev => prev.map(item => {
                    if (item.categoria === catName) {
                        const next = !item.selected;
                        return { ...item, selected: next, activeSubs: next ? [...item.subcategorias] : [] };
                    }
                    return item;
                }));
            };

            const toggleSubcategory = (catName, subName) => {
                setFilterTree(prev => prev.map(item => {
                    if (item.categoria === catName) {
                        const active = item.activeSubs.includes(subName);
                        const nextSubs = active ? item.activeSubs.filter(s => s !== subName) : [...item.activeSubs, subName];
                        return { ...item, activeSubs: nextSubs, selected: nextSubs.length === item.subcategorias.length };
                    }
                    return item;
                }));
            };

            const toggleAlert = (subName) => {
                setActiveAlerts(prev => prev.includes(subName) ? prev.filter(a => a !== subName) : [...prev, subName]);
            };

            const getFilteredPosts = () => {
                const activeSubs = filterTree.flatMap(item => item.activeSubs);
                return posts.filter(p => {
                    const cat = (p.categoria || "").trim().toLowerCase();
                    const sub = (p.subcategoria || "").trim().toLowerCase();
                    if (cat === "ignorado" || sub === "ignorado") return false;
                    return !p.subcategoria || activeSubs.includes(p.subcategoria);
                });
            };

            const getCategoryBadgeStyle = (cat) => {
                const c = (cat || "").toLowerCase();
                if (c.includes("cart") || c.includes("crédito")) {
                    return "bg-amber-50 text-amber-700 border border-amber-200";
                }
                if (c.includes("nacional")) {
                    return "bg-blue-50 text-blue-700 border border-blue-200";
                }
                return "bg-purple-50 text-purple-700 border border-purple-200";
            };

            return (
                <div className="flex flex-col h-screen max-w-sm mx-auto bg-[#F1F3F4] border-x border-gray-200 relative shadow-2xl">
                    
                    {/* CABEÇALHO CLEAN WHITE COM TEXTO GRADIENTE */}
                    <header className="sticky top-0 bg-white border-b border-gray-150 h-14 flex items-center justify-between px-4 z-40 shadow-sm">
                        <div className="flex items-center gap-2">
                            <span className="font-extrabold tracking-tight text-xs font-sans uppercase bg-gradient-to-r from-[#0f3a5f] to-[#1d4ed8] bg-clip-text text-transparent">POINT DAS MILHAS</span>
                        </div>
                        
                        <div className="flex items-center gap-1.5">
                            <button 
                                onClick={fetchNewsFromSupabase}
                                className="flex items-center gap-1 bg-[#0f3a5f]/10 hover:bg-[#0f3a5f]/20 text-[#0f3a5f] px-2.5 py-0.5 rounded-full text-[9px] font-bold transition border border-[#0f3a5f]/20 shadow-sm active:scale-95 cursor-pointer"
                            >
                                <i data-lucide="refresh-cw" className={"w-2.5 h-2.5 text-[#0f3a5f] " + (isLoading ? "animate-spin" : "")}></i>
                                <span>Atualizar</span>
                            </button>
                        </div>
                    </header>

                    {/* MIOLO COM SCROLL INDEPENDENTE */}
                    <div className="flex-1 overflow-y-auto px-3 py-3 pb-24">
                        {isLoading && (
                            <div className="py-12 flex flex-col items-center justify-center text-gray-500 text-xs">
                                <span className="animate-spin text-blue-500 text-lg mb-2">●</span>
                                Carregando últimas novidades...
                            </div>
                        )}

                        {!isLoading && getFilteredPosts().length === 0 ? (
                            <div className="py-20 text-center text-gray-500 text-xs px-6 border border-dashed border-gray-300 bg-white rounded-2xl shadow-sm">
                                Nenhuma notícia atende aos filtros atuais. Modifique suas seleções na aba de Filtros abaixo!
                            </div>
                        ) : (
                            <div className="flex flex-col gap-1.5">
                                {getFilteredPosts().map(post => {
                                    return (
                                        <div 
                                            key={post.id || post.url || post.link}
                                            onClick={() => setReadingPost(post)}
                                            className="bg-white hover:bg-gray-50 border border-gray-200/80 p-2.5 text-left rounded-xl transition cursor-pointer flex flex-col gap-1 shadow-sm active:bg-gray-100"
                                        >
                                            <h3 className="text-[11px] font-bold text-gray-900 line-clamp-2 leading-snug tracking-tight">
                                                {post.title}
                                            </h3>
                                            
                                            <div className="flex items-center justify-between text-[10px] text-gray-500 font-medium">
                                                <span>{post.source_site ? post.source_site.replace("www.","") : (post.sourceName || "portal")}</span>
                                                <span className="font-mono text-[9px]">recent</span>
                                            </div>

                                            <div className="flex items-center justify-between mt-1 pt-1 border-t border-gray-100">
                                                <span className={"font-mono text-[8px] px-2 py-0.5 rounded-full font-bold uppercase tracking-wide shrink-0 " + getCategoryBadgeStyle(post.categoria)}>
                                                    {post.subcategoria || "Milhas Geral"}
                                                </span>
                                                <i data-lucide="chevron-right" className="w-3.5 h-3.5 text-gray-400"></i>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                    </div>

                    {/* CONTROLES DE LEITURA CHEIA */}
                    {readingPost && (
                        <div className="absolute inset-x-0 top-0 bottom-0 bg-white z-50 rounded-b-[34px] p-1 flex flex-col">
                            <div className="h-14 bg-white border-b border-gray-150 flex items-center justify-between px-2 shrink-0">
                                <button 
                                    onClick={() => setReadingPost(null)}
                                    style={{ width: '45px', height: '45px' }}
                                    className="flex items-center justify-center text-gray-600 hover:text-gray-900"
                                >
                                    <span className="text-lg font-bold">←</span>
                                </button>
                                <span className="text-[10px] font-bold text-gray-900 max-w-[150px] truncate">{readingPost.title}</span>
                                <a 
                                    href={readingPost.url || readingPost.link} 
                                    target="_blank" 
                                    className="text-[10px] text-blue-600 bg-blue-50 hover:bg-blue-100 px-2.5 py-1.5 rounded font-bold transition flex items-center gap-1 active:scale-95"
                                >
                                    Abrir Link
                                </a>
                            </div>
                            <div className="flex-1 bg-white rounded-b-2xl overflow-hidden relative flex flex-col">
                                <iframe 
                                    src={readingPost.url || readingPost.link} 
                                    className="flex-1 w-full border-none h-full bg-gray-50"
                                    title="Modo Leitura"
                                    sandbox="allow-scripts allow-same-origin allow-popups"
                                />
                            </div>
                        </div>
                    )}

                    {/* BARRA DE NAVEGAÇÃO INFERIOR FIXA (BOTTOM NAV) - COR BRANCA COM TEXTO EM AZUL GRADIENTE */}
                    <nav className="absolute bottom-0 inset-x-0 h-14 bg-white border-t border-gray-150 flex items-center justify-around z-40 px-2 shrink-0 shadow-md text-[#0f3a5f]">
                        <button 
                            onClick={() => { setActiveScreen("feed"); setIsBottomSheetOpen(false); }}
                            style={{ width: '56px', height: '44px' }}
                            className={"flex flex-col items-center justify-center gap-0.5 transition " + (activeScreen === "feed" ? "scale-105" : "hover:text-[#0f3a5f]/80")}
                        >
                            <i data-lucide="book-open" className={"w-4 h-4 " + (activeScreen === "feed" ? "text-[#0f3a5f]" : "text-[#0f3a5f]/50")}></i>
                            <span className={"text-[9px] font-extrabold " + (activeScreen === "feed" ? "bg-gradient-to-r from-[#0f3a5f] to-[#1d4ed8] bg-clip-text text-transparent" : "text-[#0f3a5f]/50")}>Notícias</span>
                        </button>
                        
                        <button 
                            onClick={() => setIsBottomSheetOpen(true)}
                            style={{ width: '64px', height: '44px' }}
                            className="flex flex-col items-center justify-center gap-0.5"
                        >
                            <div className="w-7 h-7 rounded-full flex items-center justify-center bg-[#0f3a5f]/10 border border-[#0f3a5f]/20 shadow-sm relative -top-0.5 animate-fade-in">
                                <i data-lucide="filter" className="w-3.5 h-3.5 text-[#0f3a5f]"></i>
                            </div>
                            <span className="text-[9px] font-extrabold text-[#0f3a5f]/50 -mt-0.5">Filtros</span>
                        </button>

                        <button 
                            onClick={() => { setActiveScreen("alerts"); setIsBottomSheetOpen(false); }}
                            style={{ width: '56px', height: '44px' }}
                            className={"flex flex-col items-center justify-center gap-0.5 transition " + (activeScreen === "alerts" ? "scale-105" : "hover:text-[#0f3a5f]/80")}
                        >
                            <div className="relative">
                                <i data-lucide="bell" className={"w-4 h-4 " + (activeScreen === "alerts" ? "text-[#0f3a5f]" : "text-[#0f3a5f]/50")}></i>
                                {activeAlerts.length > 0 && (
                                    <span className="absolute -top-1.5 -right-1.5 w-2.5 h-2.5 bg-red-500 text-white font-black text-[7px] flex items-center justify-center rounded-full border border-white animate-fade-in">
                                        {activeAlerts.length}
                                    </span>
                                )}
                            </div>
                            <span className={"text-[9px] font-extrabold " + (activeScreen === "alerts" ? "bg-gradient-to-r from-[#0f3a5f] to-[#1d4ed8] bg-clip-text text-transparent" : "text-[#0f3a5f]/50")}>Alertas</span>
                        </button>
                    </nav>

                    {/* ALERTA SISTÊMICO PUSH */}
                    {activeScreen === "alerts" && (
                        <div className="flex-1 overflow-y-auto px-2 py-3 pb-16 text-left bg-[#F1F3F4]">
                            <h3 className="text-xs font-bold text-gray-800 uppercase tracking-wide mb-2 border-b border-gray-200 pb-1.5 flex items-center gap-1.5">
                                <i data-lucide="bell" className="w-3.5 h-3.5 text-blue-600 animate-pulse"></i> Alertas Ativos
                            </h3>

                            <p className="text-[10px] text-gray-650 mb-3 leading-relaxed font-sans">
                                Você receberá alertas push virtuais no celular sempre que surgir uma nova notícia nos canais marcados em azul.
                            </p>

                            <div className="space-y-1.5 flex flex-col">
                                {activeAlerts.length === 0 ? (
                                    <em className="text-xs text-gray-400 block py-6 text-center bg-white rounded-xl border border-gray-200">Nenhum alerta ativo.</em>
                                ) : (
                                    activeAlerts.map((al) => {
                                        return (
                                            <div key={al} className="bg-white border border-gray-205 p-2.5 rounded-xl flex items-center justify-between shadow-sm">
                                                <div className="flex flex-col gap-0.5 text-left">
                                                    <span className="text-xs font-bold text-gray-800">{al}</span>
                                                    <span className="text-[9px] font-mono text-gray-400">Notificará imediatamente</span>
                                                </div>
                                                <button
                                                    onClick={() => toggleAlert(al)}
                                                    className="text-[10px] text-red-500 hover:text-red-700 font-bold hover:underline cursor-pointer"
                                                >
                                                    Desativar
                                                </button>
                                            </div>
                                        );
                                    })
                                )}
                            </div>
                        </div>
                    )}

                    {/* BOTTOM SHEET DE FILTROS COM CHECKBOXES CIRCULARES */}
                    {isBottomSheetOpen && (
                        <div className="absolute inset-x-0 bottom-0 top-1/4 bg-white border-t border-gray-205 rounded-t-3xl z-50 flex flex-col shadow-2xl overflow-hidden font-sans text-[#202124]">
                            {/* Header da bottom sheet */}
                            <div className="h-12 bg-gray-50 border-b border-gray-200 flex items-center justify-between px-4 shrink-0">
                                <div className="flex items-center gap-1.5">
                                    <span className="w-2 h-2 rounded-full bg-blue-600"></span>
                                    <span className="text-[10px] font-bold text-gray-500 uppercase tracking-wide">FILTROS DAS MILHAS</span>
                                </div>
                                <button 
                                    onClick={() => setIsBottomSheetOpen(false)}
                                    className="text-[10px] text-white bg-[#1a73e8] hover:bg-blue-700 px-3 py-1 rounded-md transition font-bold cursor-pointer"
                                >
                                    Aplicar
                                </button>
                            </div>

                            {/* Conteúdo interno da bottom sheet */}
                            <div className="flex-1 overflow-y-auto p-3 space-y-2.5">
                                {filterTree.map(item => {
                                    return (
                                        <div key={item.categoria} className="flex flex-col gap-1">
                                            {/* Linha da Categoria-mãe */}
                                            <div className="flex items-center justify-between bg-gray-50 p-1.5 rounded-xl border border-gray-200">
                                                <button
                                                    onClick={() => toggleCategory(item.categoria)}
                                                    style={{ width: "36px", height: "36px" }}
                                                    className="flex items-center justify-center shrink-0 cursor-pointer"
                                                >
                                                    <div className={"w-6 h-6 rounded-full border transition-all flex items-center justify-center " + (
                                                        item.selected 
                                                            ? "bg-blue-600 border-blue-700 text-white font-black" 
                                                            : "bg-white border-gray-300 text-transparent"
                                                    )}>
                                                        ✓
                                                    </div>
                                                </button>

                                                <div className="flex-1 pl-1.5 text-left select-none">
                                                    <span className="text-[12px] font-bold text-gray-900 block">{item.categoria}</span>
                                                    <span className="text-[9px] text-gray-500 block mt-0.5">
                                                        {item.activeSubs.length} de {item.subcategorias.length} marcados
                                                    </span>
                                                </div>
                                            </div>

                                            {/* Subcategorias */}
                                            <div className="pl-3.5 space-y-0.5 border-l border-gray-200 ml-4 pt-1 flex flex-col">
                                                {item.subcategorias.map(sub => {
                                                    const active = item.activeSubs.includes(sub);
                                                    const alerted = activeAlerts.includes(sub);
                                                    return (
                                                        <div key={sub} className="flex items-center justify-between py-1 border-b border-gray-150">
                                                            <div className="flex items-center gap-2">
                                                                <button
                                                                    onClick={() => toggleSubcategory(item.categoria, sub)}
                                                                    style={{ width: "32px", height: "32px" }}
                                                                    className="flex items-center justify-center cursor-pointer"
                                                                >
                                                                    <div className={"w-5 h-5 rounded-full border transition-all flex items-center justify-center " + (
                                                                        active 
                                                                            ? "bg-blue-600 border-blue-700 text-white font-bold text-xs" 
                                                                            : "bg-white border-gray-300 text-transparent"
                                                                    )}>
                                                                        ✓
                                                                    </div>
                                                                </button>
                                                                <span className="text-[11px] text-gray-700 font-medium">{sub}</span>
                                                            </div>

                                                            <button
                                                                onClick={() => toggleAlert(sub)}
                                                                style={{ width: "32px", height: "32px" }}
                                                                className={"flex items-center justify-center cursor-pointer transition " + (
                                                                    alerted ? "text-blue-600" : "text-gray-400 hover:text-gray-600"
                                                                )}
                                                            >
                                                                🔔
                                                            </button>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        // Inicializa ícones do Lucide
        setTimeout(() => {
            if (window.lucide) {
                window.lucide.createIcons();
            }
        }, 800);
    </script>
</body>
</html>
